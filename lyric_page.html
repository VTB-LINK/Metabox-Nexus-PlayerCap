    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
        }

        .bg-particles::before,
        .bg-particles::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.3;
            animation: float 8s ease-in-out infinite;
        }

        .bg-particles::before {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #ff6b6b, transparent);
            top: -100px;
            left: -100px;
        }

        .bg-particles::after {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4ecdc4, transparent);
            bottom: -100px;
            right: -100px;
            animation-delay: -4s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translate(0, 0) scale(1);
            }

            50% {
                transform: translate(30px, -30px) scale(1.1);
            }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 800px;
            text-align: center;
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-height: 100vh;
            overflow: hidden;
        }

        .header {
            margin-bottom: 10px;
        }

        .song-info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 14px;
        }

        .cover-art {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            box-shadow: none;
            transition: opacity 0.35s cubic-bezier(0.64, 0, 0.78, 0);
            opacity: 0;
        }

        .cover-art.visible {
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .cover-spinner {
            width: 100%;
            height: 100%;
        }

        .cover-spinner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-art .cover-img-old {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: opacity 0.8s ease;
        }

        .cover-art::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 16px;
            height: 16px;
            background: #1a1a2e;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        @keyframes cover-spin {
            from {
                transform: scale(1) rotate(0deg);
            }

            to {
                transform: scale(1) rotate(360deg);
            }
        }

        /* Cover style variants */
        .cover-art.style-circle::after {
            display: none;
        }

        .cover-art.style-square {
            border-radius: 12px;
        }

        .cover-art.style-square::after {
            display: none;
        }

        /* Cover pause shrink mode */
        .cover-art.cover-shrunk {
            transform-origin: center center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.6s ease;
        }

        .song-meta {
            text-align: left;
        }

        .song-meta .song-name {
            font-size: 1.05rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .song-meta .song-singer {
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            margin-top: 2px;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-shift 5s ease infinite;
            letter-spacing: 4px;
        }

        @keyframes gradient-shift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 300;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            transition: background 0.3s;
        }

        .status-dot.connected {
            background: #44ff44;
            box-shadow: 0 0 8px #44ff44;
        }

        .lyrics-display {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex: 1;
            min-height: 240px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        .lyrics-display::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff6b6b, #ffd93d, #4d96ff, transparent);
            opacity: 0.6;
        }

        .lyric-line {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.35);
            transition: color 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1.8;
            letter-spacing: 2px;
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .lyric-line.prev {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .lyric-line.current {
            font-size: 2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 107, 107, 0.5), 0 0 80px rgba(255, 107, 107, 0.2);
            transform: scale(1.02);
        }

        .lyric-sub-text {
            font-size: 0.85rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        .lyric-line.next {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.25);
            transform: translateY(5px);
        }

        .lyric-line.appear {
            animation: lyric-appear 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .lyric-line.exit {
            animation: lyric-exit 0.35s cubic-bezier(0.64, 0, 0.78, 0) forwards;
        }

        .lyric-line.exit-fade {
            animation: lyric-exit-fade 0.35s cubic-bezier(0.64, 0, 0.78, 0) forwards;
        }

        @keyframes lyric-appear {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
                filter: blur(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1.02);
                filter: blur(0);
            }
        }

        @keyframes lyric-exit {
            from {
                opacity: 1;
                transform: translateY(0) scale(1.02);
                filter: blur(0);
            }

            to {
                opacity: 0;
                transform: translateY(-30px) scale(0.95);
                filter: blur(4px);
            }
        }

        @keyframes lyric-exit-fade {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .idle-text {
            font-size: 1.2rem;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 4px;
        }

        .idle-text .music-note {
            display: inline-block;
            animation: bounce 1.5s ease-in-out infinite;
        }

        .idle-text .music-note:nth-child(2) {
            animation-delay: 0.3s;
        }

        .idle-text .music-note:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        .progress-bar {
            width: 100%;
            margin-top: 30px;
            height: 3px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .info-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 300;
        }

        .all-lyrics {
            margin-top: 10px;
            flex-shrink: 1;
            min-height: 0;
            overflow-y: auto;
            width: 100%;
            padding: 20px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .all-lyrics::-webkit-scrollbar {
            width: 4px;
        }

        .all-lyrics::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .all-lyrics .line {
            padding: 4px 0;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }

        .all-lyrics .line.highlight {
            color: #ff6b6b;
            font-weight: 700;
        }

        /* Pure mode styles */

        body.pure-mode {
            background: transparent;
        }

        body.pure-mode .bg-particles {
            display: none;
        }

        body.pure-mode .container {
            width: 100%;
            max-width: 100%;
        }

        body.pure-mode .header,
        body.pure-mode .song-info-row {
            display: none;
        }

        body.pure-mode .progress-bar,
        body.pure-mode .info-bar {
            display: none;
        }

        body.pure-mode .all-lyrics {
            display: none;
        }

        body.pure-mode .lyrics-display {
            background: transparent;
            border: none;
            backdrop-filter: none;
            height: auto;
            min-height: 0;
            overflow: visible;
            padding: 0;
        }

        body.pure-mode .lyrics-display::before {
            display: none;
        }

        /* Song-title mode (reuse pure-mode layout) */

        body.song-title-mode {
            background: transparent;
        }

        body.song-title-mode .bg-particles {
            display: none;
        }

        body.song-title-mode .container {
            width: 100%;
            max-width: 100%;
        }

        body.song-title-mode .header,
        body.song-title-mode .song-info-row {
            display: none;
        }

        body.song-title-mode .progress-bar,
        body.song-title-mode .info-bar {
            display: none;
        }

        body.song-title-mode .all-lyrics {
            display: none;
        }

        body.song-title-mode .lyrics-display {
            background: transparent;
            border: none;
            backdrop-filter: none;
            height: auto;
            min-height: 0;
            overflow: visible;
            padding: 0;
        }

        body.song-title-mode .lyrics-display::before {
            display: none;
        }

        /* Cover-only mode */
        body.cover-only-mode {
            background: transparent;
        }

        body.cover-only-mode .bg-particles {
            display: none;
        }

        body.cover-only-mode .container {
            width: auto;
            max-width: none;
            height: auto;
            max-height: none;
            justify-content: center;
        }

        body.cover-only-mode .header,
        body.cover-only-mode .lyrics-display,
        body.cover-only-mode .progress-bar,
        body.cover-only-mode .info-bar,
        body.cover-only-mode .all-lyrics,
        body.cover-only-mode .song-meta {
            display: none !important;
        }

        body.cover-only-mode .song-info-row {
            display: flex !important;
            margin: 0;
            gap: 0;
        }

        /* Responsive hiding - media query approach */

        @media (max-height: 800px) {
            .all-lyrics {
                max-height: 150px;
            }
        }

        @media (max-height: 600px) {
            .all-lyrics {
                display: none !important;
            }
        }

        @media (max-height: 500px) {

            .progress-bar,
            .info-bar {
                display: none !important;
            }
        }

        @media (max-height: 400px) {
            .header {
                display: none !important;
            }

            .container {
                width: 100%;
                height: 100vh;
            }

            .lyrics-display {
                height: 100vh;
                border-radius: 0;
            }
        }
        /* === Editor Mode === */

        body.editor-mode {
            display: block;
            background: #1a1a2e;
            overflow: hidden;
        }

            flex-shrink: 0;

        .editor-bottom-bar code:hover {

        }

        .editor-bottom-bar label {
            font-size: 0.65rem;

            align-items: center;

            color: rgba(255, 255, 255, 0.4);
            white-space: nowrap;

        /* 左导航栏 */
        .editor-nav {
            width: 150px;
            min-width: 150px;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.15);

        .editor-nav-logo {

        .editor-nav-logo h1 {

            font-weight: 900;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff);
            background-size: 300% 300%;

            -webkit-text-fill-color: transparent;
            animation: gradient-shift 5s ease infinite;

        }

        .editor-nav-logo p {

            color: rgba(255, 255, 255, 0.3);

        .editor-mode-btn {

            align-items: center;

        .editor-mode-btn:hover {

        }

        .editor-mode-btn.active {

        .editor-nav-bottom {

        .editor-nav-bottom .editor-row {

        }

        .editor-nav-bottom label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
        }

        .editor-nav-bottom select {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);

        /* 右详情面板 */
        .editor-detail {
            flex: 1;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .editor-detail::-webkit-scrollbar {
            width: 4px;
        }

        .editor-detail::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        .editor-preview {
            flex: 1;
            height: 100vh;
            display: flex;
            align-items: stretch;
            padding: 20px;
            background: #0f0c29;
        }

        .editor-preview iframe {
            width: 100%;
            height: 100%;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);

        /* Editor responsive */
        @media (max-width: 900px) {
            .editor-layout {
                flex-direction: column;
            }

            .editor-panel {
                min-width: unset;
                width: 100%;
                height: auto;

            }

        .editor-group {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);

            flex-direction: column;
            gap: 12px;

        .editor-group-title {
            font-size: 0.8rem;
            font-weight: 700;

            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: color 0.2s;
        }

        .editor-group-title:hover {

        }

        .editor-group-title::after {
            content: '▼';
            font-size: 0.55rem;
            transition: transform 0.3s;
            opacity: 0.5;
        }

        .editor-group.collapsed .editor-group-title::after {
            transform: rotate(-90deg);
        }

        .editor-group.collapsed > *:not(.editor-group-title) {
            display: none !important;
        }

        .editor-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .editor-row label {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
            white-space: nowrap;
        }

        .editor-row select,
        .editor-row input[type="number"] {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .editor-row select:focus,
        .editor-row input[type="number"]:focus {
            border-color: rgba(255, 107, 107, 0.5);
        }

        .editor-row select {
            min-width: 130px;
        }

        .editor-row select option {
            background: #16213e;
            color: #fff;
        }

        .editor-row input[type="number"] {

        .editor-row input[type="number"]::-webkit-inner-spin-button,

        }

            border: 1px solid rgba(255, 255, 255, 0.12);

            background: rgba(255, 255, 255, 0.08);

        .editor-row input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 2px;

        .editor-row input[type="color"]::-webkit-color-swatch {
            border: none;
            border-radius: 4px;

        .color-input-group {
            display: flex;
            align-items: center;
            gap: 6px;

        .color-input-group .color-hex {

            outline: none;
            text-align: center;
            box-sizing: border-box;

        .color-input-group .color-hex:focus {
            border-color: rgba(255, 107, 107, 0.5);
        }

        .color-input-group .color-reset {

            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;

            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;

        .color-input-group .color-reset:hover {
            border-color: rgba(255, 107, 107, 0.4);
            color: #ff6b6b;
        }

        /* Toggle switch */
        .toggle-switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 22px;
            transition: background 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 16px;
            width: 16px;
            left: 3px;
            bottom: 3px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: #ff6b6b;
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(18px);
        }

        .editor-sub-row {
            padding-left: 12px;
            border-left: 2px solid rgba(255, 107, 107, 0.3);
        }

            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;

            min-width: 0;

        .editor-row input[type="text"]:focus {

        }

        .editor-row input[type="text"]::placeholder {

        }

        .font-search-wrap {
            width: 100%;
        }

        .font-search-wrap input {
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 8px;
            color: #fff;
            padding: 6px 10px;
            font-size: 0.82rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .font-search-wrap input:focus {
            border-color: rgba(255, 107, 107, 0.5);
        }

        .font-search-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .font-list {
            max-height: 0;

            border: 1px solid transparent;
            border-radius: 8px;
            margin-top: 6px;
            transition: max-height 0.2s ease, border-color 0.2s;
        }

        .font-list.open {

        .font-list::-webkit-scrollbar {

        .font-list::-webkit-scrollbar-thumb {

        .font-item {

        .font-item:hover {

        .font-item.selected {

        }

        .font-preview {

            text-align: center;

        /* Range slider */

            border-radius: 2px;

        .editor-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff6b6b;
            cursor: pointer;
        }

        .editor-range-value {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            min-width: 48px;
            width: 48px;
            flex: none;
            text-align: right;
        }

        /* 滑条旁数字框与文本值对齐 */
        .editor-row input[type="number"].range-num-input {
            width: 48px;
            flex: none;
            text-align: center;
            padding: 3px 4px;
            font-size: 0.78rem;
        }


        .editor-btn {
            background: rgba(255, 107, 107, 0.15);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            padding: 8px 12px;
            font-size: 0.8rem;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }

        .editor-btn:hover {
            background: rgba(255, 107, 107, 0.25);
        }

        .editor-btn.copied {
            background: rgba(68, 255, 68, 0.15);
            border-color: rgba(68, 255, 68, 0.3);
            color: #44ff44;
        }

    </style>
</head>

<body>
    <div class="bg-particles"></div>

    <div class="container">
        <div class="header">
            <h1>♪ 实时歌词 ♪</h1>
            <div class="status">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">连接中...</span>
            </div>
            <div class="song-title" id="songTitle"
                style="margin-top:8px;font-size:0.95rem;font-weight:400;color:rgba(255,255,255,0.5);letter-spacing:2px;min-height:1.2em;">
            </div>
        </div>

        <div class="song-info-row" id="songInfoRow" style="display:none;">
            <div class="cover-art" id="coverArt">
                <img class="cover-img-old" id="coverImgOld" src="" alt="" style="opacity:0;">
                <div class="cover-spinner" id="coverSpinner">
                    <img id="coverImg" src="" alt="">
                </div>
            </div>
            <div class="song-meta">
                <div class="song-name" id="songName"></div>
                <div class="song-singer" id="songSinger"></div>
            </div>
        </div>

        <div class="lyrics-display" id="lyricsDisplay">
            <div class="idle-text">
                <span class="music-note">♪</span>
                <span>等待歌曲播放</span>
                <span class="music-note">♫</span>
                <span class="music-note">♪</span>
            </div>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="info-bar">
            <span id="lineInfo">--</span>
            <span id="timeInfo" style="white-space:nowrap;">--:-- / --:--</span>
        </div>

        <div class="all-lyrics" id="allLyrics"></div>
    </div>

    <script>
        // URL 参数解析
        const urlParams = new URLSearchParams(window.location.search);
        const pureMode = urlParams.has('pure');
        const songTitleMode = urlParams.has('song_title');
        const songTitleFormat = urlParams.get('song_title_format') || 'name';
        const songTitleSep = urlParams.get('song_title_sep') || ' / ';

        // 歌名溢出模式参数
        const stOverflow = urlParams.get('st_overflow') || 'wrap';
        const stScrollSpeed = parseFloat(urlParams.get('st_scroll_speed') || '50');
        const stPpTime = parseFloat(urlParams.get('st_pp_time') || '3');
        const stPpPause = parseFloat(urlParams.get('st_pp_pause') || '1.5');
        const stScrollEase = urlParams.get('st_scroll_ease') || 'ease-in-out';

        // 歌词（纯）溢出模式参数
        const pureOverflow = urlParams.get('overflow') || 'wrap';
        const pureScrollSpeed = parseFloat(urlParams.get('scroll_speed') || '50');
        const purePpTime = parseFloat(urlParams.get('pp_time') || '3');
        const purePpPause = parseFloat(urlParams.get('pp_pause') || '1.5');
        const pureScrollEase = urlParams.get('scroll_ease') || 'ease-in-out';
        const oneLineMode = urlParams.has('one_line');
        const fontColor = urlParams.get('color') || null;
        const customFont = urlParams.get('font') || null;
        const glowEnabled = urlParams.has('glow');
        const glowColor = urlParams.get('glow_color') || null;
        const bgColor = urlParams.get('bg') || null;
        const strokeEnabled = urlParams.has('stroke');
        const strokeWidth = urlParams.get('stroke_width') || '1';
        const strokeColor = urlParams.get('stroke_color') || '#000';

        // 封面参数
        const coverOnly = urlParams.has('cover_only');
        const coverStyle = urlParams.get('cover_style') || 'disc';
        const coverRotate = urlParams.get('cover_rotate') || 'playback';
        const coverSpinSpeed = parseFloat(urlParams.get('cover_spin_speed') || '12');
        const coverSize = parseInt(urlParams.get('cover_size') || '80');

        // 封面暂停行为参数
        // cover_pause: 'none'(默认，不处理) | 'hold'(暂停后等待N秒隐藏) | 'shrink'(缩小到角落，永不隐藏)
        const coverPauseMode = urlParams.get('cover_pause') || 'none';
        const coverPauseHold = parseFloat(urlParams.get('cover_pause_hold') ?? '-1'); // -1=永不隐藏, 0+=秒数
        let coverPauseDir = urlParams.get('cover_pause_dir') || 'bl';
        let coverPauseScale = Math.max(0, Math.min(1, parseFloat(urlParams.get('cover_pause_scale') || '0.25')));

        // 字号缩放 & 文本对齐
        const fontScale = Math.max(0.5, Math.min(3, parseFloat(urlParams.get('font_scale')) || 1));
        const textAlignRaw = urlParams.get('text_align') || 'center';
        const textAlign = ['left', 'center', 'right'].includes(textAlignRaw) ? textAlignRaw : 'center';

        // === 编辑器模式检测 ===
        const isEditorMode = urlParams.toString() === '';
        if (isEditorMode) {
            initEditor();
        }

        // 加载自定义字体（Google Fonts）
        if (customFont) {
            const fontLink = document.createElement('link');
            fontLink.href = `https://fonts.googleapis.com/css2?family=${encodeURIComponent(customFont).replace(/%20/g, '+')}:wght@300;400;700;900&display=swap`;
            fontLink.rel = 'stylesheet';
            document.head.appendChild(fontLink);
            document.body.style.fontFamily = `'${customFont.replace(/\+/g, ' ')}', 'Noto Sans SC', sans-serif`;
        }

        // 根据 song_title 模式应用样式（复用 pure 逻辑）
        if (songTitleMode) {
            document.documentElement.style.backgroundColor = bgColor || 'transparent';
            document.body.style.background = bgColor || 'transparent';
            document.body.classList.add('song-title-mode');

            const dynamicRules = [];
            const textColor = fontColor || '#fff';
            let shadowCSS = 'none';
            if (glowEnabled) {
                const gc = glowColor || 'rgba(255, 107, 107, 0.5)';
                shadowCSS = `0 0 20px ${gc}, 0 0 40px ${gc}, 0 0 80px ${gc}`;
            }
            let strokeCSS = '';
            if (strokeEnabled) {
                strokeCSS = `-webkit-text-stroke: ${strokeWidth}px ${strokeColor}; paint-order: stroke fill;`;
            }
            dynamicRules.push(`.lyric-line.current { color: ${textColor} !important; text-shadow: ${shadowCSS} !important; ${strokeCSS} }`);
            if (dynamicRules.length) {
                const style = document.createElement('style');
                style.textContent = dynamicRules.join('\n');
                document.head.appendChild(style);
            }
        }

        // 根据 pure 模式应用样式
        if (pureMode) {
            document.documentElement.style.backgroundColor = bgColor || 'transparent';
            document.body.style.background = bgColor || 'transparent';
            document.body.classList.add('pure-mode');

            // 构建 current 行动态样式
            const dynamicRules = [];
            const textColor = fontColor || '#fff';
            let shadowCSS = 'none';
            if (glowEnabled) {
                const gc = glowColor || 'rgba(255, 107, 107, 0.5)';
                shadowCSS = `0 0 20px ${gc}, 0 0 40px ${gc}, 0 0 80px ${gc}`;
            }
            let strokeCSS = '';
            if (strokeEnabled) {
                strokeCSS = `-webkit-text-stroke: ${strokeWidth}px ${strokeColor}; paint-order: stroke fill;`;
            }
            dynamicRules.push(`.lyric-line.current { color: ${textColor} !important; text-shadow: ${shadowCSS} !important; ${strokeCSS} }`);
            if (dynamicRules.length) {
                const style = document.createElement('style');
                style.textContent = dynamicRules.join('\n');
                document.head.appendChild(style);
            }
        } else {
            // 非 pure 模式下也支持 glow / stroke 参数
            const extraRules = [];
            if (glowEnabled) {
                const gc = glowColor || 'rgba(255, 107, 107, 0.5)';
                extraRules.push(`text-shadow: 0 0 20px ${gc}, 0 0 40px ${gc}, 0 0 80px ${gc} !important;`);
            }
            if (strokeEnabled) {
                extraRules.push(`-webkit-text-stroke: ${strokeWidth}px ${strokeColor}; paint-order: stroke fill;`);
            }
            if (extraRules.length) {
                const style = document.createElement('style');
                style.textContent = `.lyric-line.current { ${extraRules.join(' ')} }`;
                document.head.appendChild(style);
            }
        }

        // 字号缩放 & 文本对齐 动态样式
        if (!isEditorMode) {
            const layoutRules = [];
            if (fontScale !== 1) {
                layoutRules.push(`.lyric-line { font-size: calc(1.2rem * ${fontScale}); }`);
                layoutRules.push(`.lyric-line.prev { font-size: calc(1rem * ${fontScale}); }`);
                layoutRules.push(`.lyric-line.current { font-size: calc(2rem * ${fontScale}); }`);
                layoutRules.push(`.lyric-line.next { font-size: calc(1rem * ${fontScale}); }`);
                layoutRules.push(`.lyric-sub-text { font-size: calc(0.85rem * ${fontScale}); }`);
            }
            if (textAlign !== 'center') {
                const pad = textAlign === 'left' ? 'padding-left: 4px;' : 'padding-right: 4px;';
                layoutRules.push(`.lyric-line, .lyric-sub-text { text-align: ${textAlign}; width: 100%; ${pad} box-sizing: border-box; }`);
                // 缩放原点跟随对齐方向，防止放大后裁切
                const origin = textAlign === 'left' ? 'left center' : 'right center';
                const dir = textAlign === 'left' ? -1 : 1;
                layoutRules.push(`.lyric-line { transform-origin: ${origin}; }`);
                // prev/next 偏移：都往远离对齐边的方向偏移，避免裁切
                const away = textAlign === 'left' ? 1 : -1;
                layoutRules.push(`.lyric-line.prev { transform: translateX(${3 * away}px); }`);
                layoutRules.push(`.lyric-line.next { transform: translateX(${5 * away}px); }`);
                // 出入场动画改为水平滑动
                layoutRules.push(`@keyframes lyric-appear {
                    from { opacity: 0; transform: translateX(${30 * dir}px) scale(0.95); filter: blur(4px); }
                    to { opacity: 1; transform: translateX(0) scale(1.02); filter: blur(0); }
                }`);
                layoutRules.push(`@keyframes lyric-exit {
                    from { opacity: 1; transform: translateX(0) scale(1.02); filter: blur(0); }
                    to { opacity: 0; transform: translateX(${-30 * dir}px) scale(0.95); filter: blur(4px); }
                }`);
            }
            if (layoutRules.length) {
                const style = document.createElement('style');
                style.textContent = layoutRules.join('\n');
                document.head.appendChild(style);
            }
        }

        // Per-player 端点支持：?player=wesing → /wesing/ws
        const playerParam = urlParams.get('player') || '';
        const wsPath = playerParam ? `/${playerParam}/ws` : '/ws';
        const WS_URL = `ws://localhost:8765${wsPath}`;
        let ws = null;
        let allLyrics = [];
        let currentIndex = -1;
        let songDuration = 0;
        let reconnectTimer = null;
        let isPlaying = false;

        // === 封面样式应用 ===
        if (!isEditorMode) {
            if (coverOnly) {
                document.body.classList.add('cover-only-mode');
                document.documentElement.style.backgroundColor = bgColor || 'transparent';
                document.body.style.background = bgColor || 'transparent';
            }
            const _coverArt = document.getElementById('coverArt');
            if (coverStyle === 'circle') _coverArt.classList.add('style-circle');
            else if (coverStyle === 'square') _coverArt.classList.add('style-square');
            if (coverSize !== 80) {
                _coverArt.style.width = coverSize + 'px';
                _coverArt.style.height = coverSize + 'px';
                const _holeSize = Math.max(8, Math.round(coverSize * 0.2));
                const _sizeStyle = document.createElement('style');
                _sizeStyle.textContent = `.cover-art::after { width: ${_holeSize}px; height: ${_holeSize}px; }`;
                document.head.appendChild(_sizeStyle);
            }
        }

        // 时间插值状态
        let timeAnchor = 0;       // 最近一次服务端 play_time（秒）
        let timeAnchorAt = 0;     // 收到该 play_time 时的本地时间戳 (ms)
        let interpolating = false; // 是否正在插值
        let rafId = null;          // requestAnimationFrame ID

        // === 封面旋转引擎（缓入缓出） ===
        let coverAngle = 0;
        let coverCurrentSpd = 0;  // 当前速度 (deg/s)
        let coverTargetSpd = 0;   // 目标速度 (deg/s)
        let coverAnimFrame = null;
        let coverLastTs = 0;
        let coverSpinning = false; // 当前逻辑状态
        let _currentCoverURL = ''; // 当前封面原始 URL，用于区分切歌 vs base64 升级
        let oldCoverAngle = 0;     // 旧封面淡出时的旋转角度
        let oldCoverSpd = 0;       // 旧封面淡出时的旋转速度 (deg/s)

        function setCoverPlaying(spinning, instant) {
            // 防止同状态重复调用（instant 强制跳过）
            if (!instant && spinning === coverSpinning) return;
            coverSpinning = spinning;
            coverTargetSpd = spinning ? (360 / coverSpinSpeed) : 0;
            if (instant && spinning) {
                coverCurrentSpd = coverTargetSpd; // 跳过缓入，立即满速
            }
            if (!coverAnimFrame) {
                coverLastTs = performance.now();
                coverAnimFrame = requestAnimationFrame(tickCoverSpin);
            }
        }

        // 强制重置旋转状态（用于切歌/断连等场景）
        function resetCoverState() {
            coverSpinning = false;
            coverTargetSpd = 0;
            // 不重置 coverAngle，保持当前角度自然停下
        }

        function tickCoverSpin(ts) {
            const dt = Math.min((ts - coverLastTs) / 1000, 0.05); // 限制最大步长避免跳跃
            coverLastTs = ts;
            const alpha = 1 - Math.exp(-3 * dt);
            coverCurrentSpd += (coverTargetSpd - coverCurrentSpd) * alpha;
            coverAngle = (coverAngle + coverCurrentSpd * dt) % 360;
            const spinner = document.getElementById('coverSpinner');
            const art = document.getElementById('coverArt');
            if (spinner && art && art.classList.contains('visible')) {
                spinner.style.transform = `rotate(${coverAngle.toFixed(2)}deg)`;
            }
            // 旧封面淡出时继续旋转
            if (oldCoverSpd > 0) {
                oldCoverAngle = (oldCoverAngle + oldCoverSpd * dt) % 360;
                const oldEl = document.getElementById('coverImgOld');
                if (oldEl && oldEl.src) {
                    oldEl.style.transform = `rotate(${oldCoverAngle.toFixed(2)}deg)`;
                }
            }
            if (Math.abs(coverCurrentSpd) > 0.1 || coverTargetSpd > 0) {
                coverAnimFrame = requestAnimationFrame(tickCoverSpin);
            } else {
                coverCurrentSpd = 0;
                coverAnimFrame = null;
            }
        }

        // === 封面暂停行为引擎 ===
        let _coverPauseTimer = null;
        let _coverIsShrunk = false;
        let _coverIsHidden = false;
        let _coverPauseProtect = false; // 防止 player_clear 清除封面（shrink/hold -1 模式）

        function getShrinkTransform(dir, artEl) {
            // 在封面自身区域内缩小并移到指定角落/边
            const scale = coverPauseScale;
            const w = artEl.offsetWidth;
            const h = artEl.offsetHeight;
            const dx = w * (1 - scale) / 2;
            const dy = h * (1 - scale) / 2;
            const map = {
                'tl': { x: -dx, y: -dy },
                't':  { x: 0,   y: -dy },
                'tr': { x:  dx, y: -dy },
                'l':  { x: -dx, y: 0 },
                'r':  { x:  dx, y: 0 },
                'bl': { x: -dx, y:  dy },
                'b':  { x: 0,   y:  dy },
                'br': { x:  dx, y:  dy }
            };
            const offset = map[dir] || map['bl'];
            return `translate(${offset.x.toFixed(1)}px, ${offset.y.toFixed(1)}px) scale(${scale})`;
        }

        function animateShrink(art) {
            // 先重置到原始状态，再执行缩小动画
            art.classList.remove('cover-shrunk');
            art.style.transform = '';
            void art.offsetWidth; // 强制回流
            art.classList.add('cover-shrunk');
            void art.offsetWidth;
            art.style.transform = getShrinkTransform(coverPauseDir, art);
            _coverIsShrunk = true;
        }

        function coverPauseAction() {
            const art = document.getElementById('coverArt');
            if (!art || !art.classList.contains('visible')) return;
            clearTimeout(_coverPauseTimer);

            if (coverPauseMode === 'shrink') {
                _coverPauseProtect = true; // 永不被 player_clear 隐藏
                animateShrink(art);
            } else if (coverPauseMode === 'hold') {
                if (coverPauseHold < 0) {
                    // -1: 永不隐藏
                    _coverPauseProtect = true;
                } else {
                    // 0 或正数：暂停后 N 秒隐藏，且 override player_clear
                    _coverPauseProtect = true;
                    _coverPauseTimer = setTimeout(() => {
                        art.classList.remove('visible');
                        _coverIsHidden = true;
                        _coverPauseProtect = false;
                    }, coverPauseHold * 1000);
                }
            }
            // 'none' 模式：什么都不做，player_clear 正常清除
        }

        function coverResumeAction() {
            const art = document.getElementById('coverArt');
            if (!art) return;
            clearTimeout(_coverPauseTimer);
            _coverPauseProtect = false;

            if (_coverIsShrunk) {
                art.style.transform = '';
                // 动画完成后移除 class
                setTimeout(() => { art.classList.remove('cover-shrunk'); }, 650);
                _coverIsShrunk = false;
            }
            if (_coverIsHidden) {
                art.classList.add('visible');
                _coverIsHidden = false;
            }
        }

        // === 编辑器 → 预览 实时参数更新（免重载） ===
        window.addEventListener('message', (event) => {
            if (!event.data || event.data.type !== 'shrinkUpdate') return;
            coverPauseScale = Math.max(0, Math.min(1, event.data.scale));
            coverPauseDir = event.data.dir;
            const art = document.getElementById('coverArt');
            if (!art || !art.classList.contains('visible')) return;

            if (_coverIsShrunk) {
                // 暂停状态：用新参数重新执行缩小动画
                animateShrink(art);
            } else if (isPlaying) {
                // 播放状态：执行一次 缩小→恢复 的预览动画
                animateShrink(art);
                setTimeout(() => {
                    art.style.transform = '';
                    setTimeout(() => {
                        art.classList.remove('cover-shrunk');
                        _coverIsShrunk = false;
                    }, 650);
                }, 700);
            }
        });

        function connect() {
            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('statusText').textContent = '已连接';
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            ws.onclose = () => {
                document.getElementById('statusDot').classList.remove('connected');
                document.getElementById('statusText').textContent = '已断开 · 重连中...';
                reconnectTimer = setTimeout(connect, 3000);
            };

            ws.onerror = () => {
                ws.close();
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);

                if (data.type === 'status_update') {
                    if (data.data && data.data.status) {
                        updateStatus(data.data.status, data.data.detail);
                    }
                }

                if (data.type === 'song_info_update') {
                    if (data.data && data.data.title) {
                        document.getElementById('songTitle').textContent = '♪ ' + data.data.title;
                        // 更新封面和歌曲信息行
                        updateSongInfoRow(data.data);
                        // song_title 模式：在歌词区显示歌名
                        if (songTitleMode) {
                            let displayText = '';
                            if (songTitleFormat === 'title') {
                                const n = data.data.name || '';
                                const s = data.data.singer || '';
                                displayText = (n && s) ? n + songTitleSep + s : (n || s || data.data.title);
                            } else {
                                displayText = data.data.name || data.data.title;
                            }
                            const display = document.getElementById('lyricsDisplay');
                            cleanupScrollAnim();
                            transitionOut(display, () => {
                                if (stOverflow !== 'wrap') {
                                    display.innerHTML = `<div class="lyric-line current appear" style="overflow:hidden;"><span class="st-scroll-wrap" style="display:inline-block;white-space:nowrap;">${displayText}</span></div>`;
                                    requestAnimationFrame(() => {
                                        requestAnimationFrame(() => {
                                            const wrap = display.querySelector('.st-scroll-wrap');
                                            if (wrap) initScrollAnimation(wrap, _stScrollCfg);
                                        });
                                    });
                                } else {
                                    display.innerHTML = `<div class="lyric-line current appear">${displayText}</div>`;
                                }
                            });
                        }
                    } else {
                        // 歌曲信息清空
                        hideSongInfoRow();
                        if (songTitleMode) {
                            cleanupScrollAnim();
                            const display = document.getElementById('lyricsDisplay');
                            transitionOut(display, () => { display.innerHTML = ''; });
                        }
                    }
                }

                if (data.type === 'all_lyrics') {
                    if (songTitleMode) {
                        // song_title 模式忽略歌词事件，仅由 song_info_update 驱动
                    } else if (data.data && data.data.lyrics) {
                        // 同播放器切歌：重置歌词状态
                        currentIndex = -1;
                        allLyrics = data.data.lyrics;
                        songDuration = data.data.duration || 0;
                        renderAllLyrics();
                        if (data.data.song_title) {
                            document.getElementById('songTitle').textContent = '♪ ' + data.data.song_title;
                        }
                        // 用 play_time 启动插值计时
                        startInterpolation(data.data.play_time || 0);
                        // 丝滑过渡清空旧歌词（像切到空行一样退场），完成后显示占位
                        if (_exitTimer) { clearTimeout(_exitTimer); _exitTimer = null; }
                        const display = document.getElementById('lyricsDisplay');
                        transitionOut(display, () => {
                            display.innerHTML = '';
                            // 前奏期间（尚无 lyric_update 覆盖）显示占位提示
                            if (currentIndex === -1 && !pureMode) {
                                display.innerHTML = `
                                    <div class="idle-text">
                                        <span class="music-note">♪</span>
                                        <span>前奏中</span>
                                        <span class="music-note">♫</span>
                                    </div>`;
                            }
                        });
                    }
                }

                if (data.type === 'lyric_update') {
                    if (songTitleMode) {
                        // song_title 模式忽略歌词更新
                    } else if (!data.data || !data.data.text) {
                        // 空消息：不做处理，保留当前封面/歌词状态
                    } else {
                        currentIndex = data.data.line_index;
                        updateDisplay(data.data);
                        updateAllLyricsHighlight(data.data.line_index);
                        document.getElementById('lineInfo').textContent = `第 ${data.data.line_index + 1} / ${allLyrics.length} 行`;
                        // 校正插值锚点
                        correctInterpolation(data.data.play_time);
                    }
                }

                if (data.type === 'playback_pause') {
                    stopInterpolation();
                    isPlaying = false;
                    if (coverRotate === 'playback') setCoverPlaying(false);
                    coverPauseAction();
                }

                if (data.type === 'playback_resume') {
                    if (data.data && data.data.play_time !== undefined) {
                        startInterpolation(data.data.play_time);
                    }
                    isPlaying = true;
                    if (coverRotate === 'playback') setCoverPlaying(true);
                    coverResumeAction();
                }

                if (data.type === 'lyric_idle') {
                    // 仅信息通知，前端不做清空操作（切歌/replay 等场景由新歌词数据自然覆盖）
                }

                if (data.type === 'player_switch') {
                    // 活跃播放器切换：仅重置歌词/进度状态
                    // 封面与旋转保留，由后续 song_info_update 自然触发切歌过渡动效
                    currentIndex = -1;
                    allLyrics = [];
                    songDuration = 0;
                    stopInterpolation();
                    document.getElementById('allLyrics').innerHTML = '';
                    document.getElementById('progressFill').style.width = '0%';
                    document.getElementById('lineInfo').textContent = '--';
                    document.getElementById('timeInfo').textContent = '--:-- / --:--';
                    // 丝滑过渡清空歌词区
                    cleanupScrollAnim();
                    if (_exitTimer) { clearTimeout(_exitTimer); _exitTimer = null; }
                    const display = document.getElementById('lyricsDisplay');
                    transitionOut(display, () => { display.innerHTML = ''; });
                    // 在状态栏显示切换信息
                    const to = (data.data && data.data.to) || '';
                    const statusText = document.getElementById('statusText');
                    if (to) {
                        statusText.textContent = '🔄 切换至: ' + to;
                    } else {
                        statusText.textContent = '💤 无活跃播放器';
                    }
                    clearTimeout(window._switchTimer);
                    window._switchTimer = setTimeout(() => {
                        if (statusText.textContent.startsWith('🔄') || statusText.textContent.startsWith('💤')) {
                            statusText.textContent = '已连接';
                        }
                    }, 3000);
                }

                if (data.type === 'player_clear') {
                    // 活跃播放器已清除：重置所有显示
                    currentIndex = -1;
                    allLyrics = [];
                    songDuration = 0;
                    stopInterpolation();
                    isPlaying = false;
                    resetCoverState();
                    _currentCoverURL = '';
                    clearTimeout(_coverTransitionTimer);
                    const _clearCoverArt = document.getElementById('coverArt');
                    if (_coverPauseProtect) {
                        // shrink 或 hold(-1) 模式：保留封面，不清除
                    } else {
                        // 重置暂停行为状态
                        clearTimeout(_coverPauseTimer);
                        _coverIsShrunk = false;
                        _coverIsHidden = false;
                        _clearCoverArt.classList.remove('cover-shrunk');
                        _clearCoverArt.style.transform = '';
                        // 封面淡出（与歌词退场同步），完成后再清理资源
                        _clearCoverArt.classList.remove('visible');
                    }
                    clearTimeout(window._coverCleanupTimer);
                    window._coverCleanupTimer = setTimeout(() => {
                        if (!_coverPauseProtect) {
                            document.getElementById('coverImg').src = '';
                            document.getElementById('coverImgOld').src = '';
                            document.getElementById('songName').textContent = '';
                            document.getElementById('songSinger').textContent = '';
                        }
                    }, 300);
                    document.getElementById('allLyrics').innerHTML = '';
                    document.getElementById('progressFill').style.width = '0%';
                    document.getElementById('lineInfo').textContent = '--';
                    document.getElementById('timeInfo').textContent = '--:-- / --:--';
                    cleanupScrollAnim();
                    if (_exitTimer) { clearTimeout(_exitTimer); _exitTimer = null; }
                    const clearDisplay = document.getElementById('lyricsDisplay');
                    transitionOut(clearDisplay, () => { clearDisplay.innerHTML = ''; });
                    const clearStatus = document.getElementById('statusText');
                    clearStatus.textContent = '💤 无活跃播放器';
                    clearTimeout(window._switchTimer);
                    window._switchTimer = setTimeout(() => {
                        if (clearStatus.textContent.startsWith('💤')) {
                            clearStatus.textContent = '已连接';
                        }
                    }, 3000);
                }
            };
        }

        // === 溢出滚动引擎（通用） ===
        let _scrollAnim = null;
        let _scrollPpTimer = null;
        function cleanupScrollAnim() {
            if (_scrollAnim) { _scrollAnim.cancel(); _scrollAnim = null; }
            if (_scrollPpTimer) { clearTimeout(_scrollPpTimer); _scrollPpTimer = null; }
        }
        function initScrollAnimation(wrapEl, cfg) {
            cleanupScrollAnim();
            const container = document.getElementById('lyricsDisplay');
            const textWidth = wrapEl.scrollWidth;
            const containerWidth = container.clientWidth;
            if (textWidth <= containerWidth) return; // 无溢出无需滚动
            const overflow = textWidth - containerWidth;

            if (cfg.mode === 'scroll') {
                const gap = 80;
                const origHTML = wrapEl.innerHTML;
                wrapEl.innerHTML = origHTML + '<span style="display:inline-block;width:' + gap + 'px;"></span>' + origHTML;
                const scrollDist = textWidth + gap;
                const duration = (scrollDist / cfg.speed) * 1000;
                _scrollAnim = wrapEl.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-' + scrollDist + 'px)' }
                ], {
                    duration: duration,
                    iterations: Infinity,
                    easing: 'linear'
                });
                wrapEl.style.opacity = '0';
                requestAnimationFrame(() => {
                    wrapEl.style.transition = 'opacity 0.4s ' + cfg.ease;
                    wrapEl.style.opacity = '1';
                });
            } else if (cfg.mode === 'pingpong') {
                function pingPongCycle() {
                    _scrollAnim = wrapEl.animate([
                        { transform: 'translateX(0)' },
                        { transform: 'translateX(-' + overflow + 'px)' }
                    ], { duration: cfg.ppTime * 1000, easing: cfg.ease, fill: 'forwards' });
                    _scrollAnim.onfinish = () => {
                        _scrollPpTimer = setTimeout(() => {
                            _scrollAnim = wrapEl.animate([
                                { transform: 'translateX(-' + overflow + 'px)' },
                                { transform: 'translateX(0)' }
                            ], { duration: cfg.ppTime * 1000, easing: cfg.ease, fill: 'forwards' });
                            _scrollAnim.onfinish = () => {
                                _scrollPpTimer = setTimeout(pingPongCycle, cfg.ppPause * 1000);
                            };
                        }, cfg.ppPause * 1000);
                    };
                }
                _scrollPpTimer = setTimeout(pingPongCycle, cfg.ppPause * 1000);
            }
        }

        // 便捷：歌名模式滚动配置
        const _stScrollCfg = { mode: stOverflow, speed: stScrollSpeed, ppTime: stPpTime, ppPause: stPpPause, ease: stScrollEase };
        // 便捷：歌词模式滚动配置
        const _pureScrollCfg = { mode: pureOverflow, speed: pureScrollSpeed, ppTime: purePpTime, ppPause: purePpPause, ease: pureScrollEase };

        // === 歌词过渡动效引擎 ===
        let _exitTimer = null;
        function transitionOut(container, afterExit) {
            // 取消上一次未完成的退场
            if (_exitTimer) { clearTimeout(_exitTimer); _exitTimer = null; }

            const lines = container.querySelectorAll('.lyric-line, .lyric-sub-text, .idle-text');
            if (lines.length === 0) {
                afterExit();
                return;
            }
            lines.forEach(el => {
                el.classList.remove('appear');
                if (el.classList.contains('current')) {
                    el.classList.add('exit');
                } else {
                    el.classList.add('exit-fade');
                }
            });
            _exitTimer = setTimeout(() => {
                _exitTimer = null;
                afterExit();
            }, 300); // 略短于 exit 动画时长(350ms)，让入场无缝衔接
        }

        function updateDisplay(data) {
            const display = document.getElementById('lyricsDisplay');

            let html = '';

            if (!oneLineMode) {
                // 原模式：显示前一行、当前行、后一行
                const prevIdx = findLyricByIndex(data.line_index - 1);
                const currIdx = findLyricByIndex(data.line_index);
                const nextIdx = findLyricByIndex(data.line_index + 1);

                if (prevIdx !== null) {
                    html += `<div class="lyric-line prev">${allLyrics[prevIdx].text}</div>`;
                }

                html += `<div class="lyric-line current appear">${data.text}</div>`;
                if (data.sub_text) {
                    html += `<div class="lyric-sub-text">${data.sub_text}</div>`;
                }

                if (nextIdx !== null) {
                    html += `<div class="lyric-line next">${allLyrics[nextIdx].text}</div>`;
                }
            } else {
                // one_line 模式：只显示当前行
                if (pureOverflow !== 'wrap') {
                    html += `<div class="lyric-line current appear" style="overflow:hidden;"><span class="st-scroll-wrap" style="display:inline-block;white-space:nowrap;">${data.text}</span></div>`;
                } else {
                    html += `<div class="lyric-line current appear">${data.text}</div>`;
                }
                if (data.sub_text) {
                    html += `<div class="lyric-sub-text">${data.sub_text}</div>`;
                }
            }

            cleanupScrollAnim();
            transitionOut(display, () => {
                display.innerHTML = html;
                if (oneLineMode && pureOverflow !== 'wrap') {
                    requestAnimationFrame(() => {
                        requestAnimationFrame(() => {
                            const wrap = display.querySelector('.st-scroll-wrap');
                            if (wrap) initScrollAnimation(wrap, _pureScrollCfg);
                        });
                    });
                }
            });
        }

        function findLyricByIndex(index) {
            for (let i = 0; i < allLyrics.length; i++) {
                if (allLyrics[i].index === index) return i;
            }
            return null;
        }

        function updateStatus(status, detail, songTitle) {
            const statusText = document.getElementById('statusText');
            const statusDot = document.getElementById('statusDot');
            const display = document.getElementById('lyricsDisplay');

            const statusConfig = {
                'waiting_process': {
                    icon: '🔍',
                    text: '等待播放器启动',
                    color: '#ff9944'
                },
                'loading': {
                    icon: '⏳',
                    text: '加载中',
                    color: '#ffd93d'
                },
                'waiting_song': {
                    icon: '🎤',
                    text: '等待歌曲播放',
                    color: '#4d96ff'
                },
                'playing': {
                    icon: '🎵',
                    text: '播放中',
                    color: '#44ff44'
                },
                'paused': {
                    icon: '⏸',
                    text: '暂停中',
                    color: '#ffaa44'
                },
                'standby': {
                    icon: '💤',
                    text: '待机',
                    color: '#ff4444'
                },
            };

            const cfg = statusConfig[status] || {
                icon: '❓',
                text: status,
                color: '#888'
            };
            statusText.textContent = cfg.text;
            statusDot.style.background = cfg.color;
            statusDot.style.boxShadow = `0 0 8px ${cfg.color}`;

            // 仅处理播放/暂停状态，其他状态只更新状态栏不影响封面/歌词
            if (status === 'playing' || status === 'paused') {
                // 清除可能残留的状态提示，歌词保持不变
                const idleText = display.querySelector('.idle-text');
                if (idleText) {
                    transitionOut(display, () => { display.innerHTML = ''; });
                }
                if (status === 'playing') {
                    isPlaying = true;
                    if (coverRotate === 'playback') setCoverPlaying(true);
                } else {
                    isPlaying = false;
                    if (coverRotate === 'playback') setCoverPlaying(false);
                }
            }
            if (songTitle) {
                document.getElementById('songTitle').textContent = '♪ ' + songTitle;
            }
        }

        function renderAllLyrics() {
            const container = document.getElementById('allLyrics');
            container.innerHTML = allLyrics.map((l, i) =>
                `<div class="line" id="lyric-${l.index}">${l.text}</div>`
            ).join('');
        }

        function updateAllLyricsHighlight(index) {
            document.querySelectorAll('.all-lyrics .line').forEach(el => el.classList.remove('highlight'));
            const el = document.getElementById(`lyric-${index}`);
            if (el) {
                el.classList.add('highlight');
                el.scrollIntoView({
                    behavior: 'smooth',
                    block: 'center'
                });
            }
        }

        function formatTime(seconds) {
            if (!seconds || seconds <= 0) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // === 时间插值引擎 ===
        function startInterpolation(playTime) {
            timeAnchor = playTime;
            timeAnchorAt = performance.now();
            if (!interpolating) {
                interpolating = true;
                tickTime();
            }
        }

        function correctInterpolation(playTime) {
            timeAnchor = playTime;
            timeAnchorAt = performance.now();
        }

        function stopInterpolation() {
            interpolating = false;
            if (rafId) {
                cancelAnimationFrame(rafId);
                rafId = null;
            }
        }

        function tickTime() {
            if (!interpolating) return;
            const elapsed = (performance.now() - timeAnchorAt) / 1000;
            let currentTime = timeAnchor + elapsed;
            if (songDuration > 0 && currentTime > songDuration) {
                currentTime = songDuration;
            }
            const progress = songDuration > 0 ? Math.min(currentTime / songDuration, 1) : 0;
            document.getElementById('progressFill').style.width = `${(progress * 100).toFixed(1)}%`;
            document.getElementById('timeInfo').textContent = `${formatTime(currentTime)} / ${formatTime(songDuration)}`;
            rafId = requestAnimationFrame(tickTime);
        }

        // === 封面和歌曲信息 ===
        let _coverTransitionTimer = null;

        function updateSongInfoRow(info) {
            if (pureMode || songTitleMode) return;
            // 取消 player_clear/player_switch 的延迟清理，避免覆盖新封面
            clearTimeout(window._coverCleanupTimer);
            const row = document.getElementById('songInfoRow');
            const coverArt = document.getElementById('coverArt');
            const coverImg = document.getElementById('coverImg');
            const songName = document.getElementById('songName');
            const songSinger = document.getElementById('songSinger');

            songName.textContent = info.name || '';
            songSinger.textContent = info.singer || '';

            // 重置暂停行为状态（切歌/新歌信息覆盖暂停状态）
            clearTimeout(_coverPauseTimer);
            if (_coverIsShrunk) {
                coverArt.classList.remove('cover-shrunk');
                coverArt.style.transform = '';
                _coverIsShrunk = false;
            }
            _coverIsHidden = false;

            // 优先使用 base64，其次使用 URL
            const coverSrc = info.cover_base64 || info.cover || '';
            // 用原始 URL 判断是否切歌（区分 "新歌" 和 "同一首歌的 base64 补发"）
            const incomingURL = info.cover || '';
            const isSameSong = incomingURL !== '' && incomingURL === _currentCoverURL;
            _currentCoverURL = incomingURL;

            const coverImgOld = document.getElementById('coverImgOld');

            if (coverSrc) {
                const isAlreadyVisible = coverArt.classList.contains('visible');
                const isSameSrc = coverImg.src === coverSrc;

                if (isAlreadyVisible && !isSameSrc && !isSameSong) {
                    // 切歌：旧封面（old 层，在 spinner 外面不受旋转影响）淡出
                    clearTimeout(_coverTransitionTimer);
                    coverImg.onload = null;
                    const savedAngle = coverAngle;
                    const spinnerEl = document.getElementById('coverSpinner');
                    // old 层拷贝旧图，固定在当前旋转角度（不受 spinner 旋转影响）
                    coverImgOld.src = coverImg.src;
                    // 强制清除旧 transition 状态（快速切歌场景）
                    coverImgOld.style.transition = 'none';
                    coverImgOld.style.opacity = '1';
                    coverImgOld.style.transform = `rotate(${savedAngle.toFixed(2)}deg)`;
                    // 记录旧封面旋转状态，淡出时继续转
                    oldCoverAngle = savedAngle;
                    oldCoverSpd = coverCurrentSpd;
                    // 强制回流后恢复 transition
                    void coverImgOld.offsetWidth;
                    coverImgOld.style.transition = '';
                    // spinner 角度归零，新封面从 0° 开始
                    coverAngle = 0;
                    coverCurrentSpd = 0;
                    if (spinnerEl) spinnerEl.style.transform = 'rotate(0deg)';
                    // 新图在 old 层下面加载
                    coverImg.src = coverSrc;
                    // 启动旋转
                    if (coverRotate === 'always') {
                        setCoverPlaying(true, true);
                    } else if (coverRotate === 'playback') {
                        setCoverPlaying(isPlaying, true);
                    }
                    // 等新图加载完再淡出 old 层
                    const fadeOutOld = () => {
                        coverImg.onload = null;
                        requestAnimationFrame(() => {
                            coverImgOld.style.opacity = '0';
                        });
                    };
                    if (coverImg.complete && coverImg.naturalWidth > 0) {
                        fadeOutOld();
                    } else {
                        coverImg.onload = fadeOutOld;
                    }
                    // 过渡完成后清理
                    _coverTransitionTimer = setTimeout(() => {
                        coverImgOld.src = '';
                        coverImgOld.style.transform = '';
                        coverImg.onload = null;
                        oldCoverSpd = 0;
                    }, 1200);
                } else {
                    // 首次显示 / 同封面 / base64 升级：静默更新，不触发动效
                    clearTimeout(_coverTransitionTimer);
                    if (!isSameSrc) coverImg.src = coverSrc;
                    coverArt.classList.add('visible');
                    if (coverRotate === 'always') {
                        setCoverPlaying(true);
                    } else if (coverRotate === 'playback') {
                        setCoverPlaying(isPlaying);
                    }
                }
            } else {
                clearTimeout(_coverTransitionTimer);
                coverArt.classList.remove('visible');
                resetCoverState();
                _currentCoverURL = '';
            }

            row.style.display = 'flex';
        }

        function hideSongInfoRow() {
            if (pureMode || songTitleMode) return;
            const row = document.getElementById('songInfoRow');
            const coverArt = document.getElementById('coverArt');
            row.style.display = 'none';
            coverArt.classList.remove('visible');
            resetCoverState();
            _currentCoverURL = '';
        }

            connect();
        }
