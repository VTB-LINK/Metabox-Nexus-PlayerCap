            // === 面板控件逻辑 ===
            const frame = document.getElementById('previewFrame');
            const urlDisplay = document.getElementById('urlDisplay');
            let lastPreviewQs = frame.getAttribute('src') || '?default';

            // 获取当前活跃模式
            function getActiveMode() {
                const btn = document.querySelector('.editor-mode-btn.active');
                return btn ? btn.dataset.mode : 'default';
            }

            // 模式切换：显示/隐藏对应分组
            function switchMode(mode) {
                document.querySelectorAll('.editor-group[data-modes]').forEach(g => {
                    const modes = g.dataset.modes.split(' ');
                    g.style.display = modes.includes(mode) ? '' : 'none';
                });
                // 更新复制按钮文字
                const copyBtn = document.getElementById('btnCopyUrl');
                if (copyBtn && !copyBtn.classList.contains('copied')) {
                    const labels = { default: '📋 复制默认', pure: '📋 复制歌词', song_title: '📋 复制歌名', cover: '📋 复制封面' };
                    copyBtn.textContent = labels[mode] || labels.default;
                }
                toggleSubRows();
                refreshPreview();
            }

            // 模式按钮点击
            document.querySelectorAll('.editor-mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.editor-mode-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switchMode(btn.dataset.mode);
                });
            });

            // 收集参数并更新 iframe
            function refreshPreview(skipReload) {
                const params = new URLSearchParams();
                const mode = getActiveMode();

                if (mode === 'pure') {
                    params.set('pure', '');
                } else if (mode === 'song_title') {
                    params.set('song_title', '');
                    const stf = document.getElementById('cfgSongTitleFormat').value;
                    if (stf && stf !== 'name') params.set('song_title_format', stf);
                    if (stf === 'title') {
                        const sep = document.getElementById('cfgSongTitleSep').value;
                        if (sep !== ' / ') params.set('song_title_sep', sep);
                    }
                } else if (mode === 'cover') {
                    params.set('cover_only', '');
                } else {
                    params.set('default', '');
                }

                if (document.getElementById('cfgOneLine').checked) {
                    params.set('one_line', '');
                }

                // 歌词溢出设置（pure 模式 one_line 时生效）
                const pOv = document.getElementById('cfgPureOverflow').value;
                if (pOv && pOv !== 'wrap') {
                    params.set('overflow', pOv);
                    if (pOv === 'scroll') {
                        const spd = document.getElementById('cfgPureScrollSpeed').value;
                        if (spd && spd !== '50') params.set('scroll_speed', spd);
                    }
                    if (pOv === 'pingpong') {
                        const ppTime = document.getElementById('cfgPurePpTime').value;
                        if (ppTime && ppTime !== '3') params.set('pp_time', ppTime);
                        const ppPause = document.getElementById('cfgPurePpPause').value;
                        if (ppPause && ppPause !== '1.5') params.set('pp_pause', ppPause);
                    }
                    const ease = document.getElementById('cfgPureScrollEase').value;
                    if (ease && ease !== 'ease-in-out') params.set('scroll_ease', ease);
                }

                const player = document.getElementById('cfgPlayer').value;
                if (player) params.set('player', player);

                // 样式控件：根据模式读取不同 ID
                const isSt = mode === 'song_title';
                const color = document.getElementById(isSt ? 'cfgStColor' : 'cfgColor').value;
                if (color && color !== '#ffffff') params.set('color', color);

                if (document.getElementById(isSt ? 'cfgStGlow' : 'cfgGlow').checked) {
                    params.set('glow', '');
                    const gc = document.getElementById(isSt ? 'cfgStGlowColor' : 'cfgGlowColor').value;
                    if (gc && gc !== '#ff6b6b') params.set('glow_color', gc);
                }

                if (document.getElementById(isSt ? 'cfgStStroke' : 'cfgStroke').checked) {
                    params.set('stroke', '');
                    const sw = document.getElementById(isSt ? 'cfgStStrokeWidth' : 'cfgStrokeWidth').value;
                    if (sw && sw !== '1') params.set('stroke_width', sw);
                    const sc = document.getElementById(isSt ? 'cfgStStrokeColor' : 'cfgStrokeColor').value;
                    if (sc && sc !== '#000000') params.set('stroke_color', sc);
                }

                if (mode === 'pure' || mode === 'song_title' || mode === 'cover') {
                    const bgTransparent = document.getElementById('cfgBgTransparent').checked;
                    if (!bgTransparent) {
                        params.set('bg', document.getElementById('cfgBg').value);
                    }
                }

                // 字体
                const fontSource = document.getElementById('cfgFontSource');
                let fontName = '';
                if (fontSource && fontSource.style.display !== 'none' && fontSource.closest('.editor-row').style.display !== 'none') {
                    const src = fontSource.value;
                    if (src === 'local' && window._selectedFont) {
                        fontName = window._selectedFont;
                    } else if (src === 'manual') {
                        fontName = (document.getElementById('cfgFont').value || '').trim();
                    }
                } else {
                    fontName = (document.getElementById('cfgFont').value || '').trim();
                }
                if (fontName) params.set('font', fontName);

                // 字号缩放 & 文本对齐（根据模式读取不同控件）
                const fs = document.getElementById(isSt ? 'cfgStFontScale' : 'cfgFontScale').value;
                if (fs && fs !== '1') params.set('font_scale', fs);
                const ta = document.getElementById(isSt ? 'cfgStTextAlign' : 'cfgTextAlign').value;
                if (ta && ta !== 'center') params.set('text_align', ta);

                // 歌名溢出参数
                if (mode === 'song_title') {
                    const ov = document.getElementById('cfgStOverflow').value;
                    if (ov && ov !== 'wrap') {
                        params.set('st_overflow', ov);
                        if (ov === 'scroll') {
                            const spd = document.getElementById('cfgStScrollSpeed').value;
                            if (spd && spd !== '50') params.set('st_scroll_speed', spd);
                        }
                        if (ov === 'pingpong') {
                            const ppTime = document.getElementById('cfgStPpTime').value;
                            if (ppTime && ppTime !== '3') params.set('st_pp_time', ppTime);
                            const ppPause = document.getElementById('cfgStPpPause').value;
                            if (ppPause && ppPause !== '1.5') params.set('st_pp_pause', ppPause);
                        }
                        const ease = document.getElementById('cfgStScrollEase').value;
                        if (ease && ease !== 'ease-in-out') params.set('st_scroll_ease', ease);
                    }
                }

                // 封面
                const cs = document.getElementById('cfgCoverStyle').value;
                if (cs && cs !== 'disc') params.set('cover_style', cs);
                const cr = document.getElementById('cfgCoverRotate').value;
                if (cr && cr !== 'playback') params.set('cover_rotate', cr);
                const spd = document.getElementById('cfgSpinSpeed').value;
                if (spd && spd !== '12') params.set('cover_spin_speed', spd);
                const csz = document.getElementById('cfgCoverSize').value;
                if (csz && csz !== '80') params.set('cover_size', csz);

                // 封面暂停行为
                const cpMode = document.getElementById('cfgCoverPause').value;
                if (cpMode && cpMode !== 'none') params.set('cover_pause', cpMode);
                if (cpMode === 'hold') {
                    const holdTime = document.getElementById('cfgCoverPauseHold').value;
                    if (holdTime) params.set('cover_pause_hold', holdTime);
                }
                if (cpMode === 'shrink') {
                    const pScale = document.getElementById('cfgCoverPauseScale').value;
                    if (pScale && pScale !== '0.25') params.set('cover_pause_scale', pScale);
                    const dir = document.getElementById('cfgCoverPauseDir').value;
                    if (dir && dir !== 'bl') params.set('cover_pause_dir', dir);
                }

                const qs = '?' + params.toString();
                urlDisplay.textContent = qs;
                urlDisplay.title = qs;
                // 防闪烁：仅在 URL 变化时重新加载
                if (qs !== lastPreviewQs) {
                    lastPreviewQs = qs;
                    if (!skipReload) frame.src = qs;
                }
            }

            // 显示/隐藏子控件
            function toggleSubRows() {
                const glowOn = document.getElementById('cfgGlow').checked;
                document.getElementById('rowGlowColor').style.display = glowOn ? 'flex' : 'none';

                const strokeOn = document.getElementById('cfgStroke').checked;
                document.getElementById('rowStrokeWidth').style.display = strokeOn ? 'flex' : 'none';
                document.getElementById('rowStrokeColor').style.display = strokeOn ? 'flex' : 'none';

                // 歌名样式子控件
                const stGlowOn = document.getElementById('cfgStGlow').checked;
                document.getElementById('rowStGlowColor').style.display = stGlowOn ? 'flex' : 'none';
                const stStrokeOn = document.getElementById('cfgStStroke').checked;
                document.getElementById('rowStStrokeWidth').style.display = stStrokeOn ? 'flex' : 'none';
                document.getElementById('rowStStrokeColor').style.display = stStrokeOn ? 'flex' : 'none';

                const bgTransparent = document.getElementById('cfgBgTransparent').checked;
                document.getElementById('rowBgColor').style.display = !bgTransparent ? 'flex' : 'none';

                const rotateMode = document.getElementById('cfgCoverRotate').value;
                document.getElementById('rowSpinSpeed').style.display = rotateMode !== 'none' ? 'flex' : 'none';

                // 封面暂停子控件
                const cpMode = document.getElementById('cfgCoverPause').value;
                document.getElementById('rowCoverPauseHold').style.display = cpMode === 'hold' ? 'flex' : 'none';
                document.getElementById('rowCoverPauseScale').style.display = cpMode === 'shrink' ? 'flex' : 'none';
                document.getElementById('rowCoverPauseDir').style.display = cpMode === 'shrink' ? 'flex' : 'none';

                const stfEl = document.getElementById('cfgSongTitleFormat');
                if (stfEl) {
                    document.getElementById('rowSongTitleSep').style.display = stfEl.value === 'title' ? 'flex' : 'none';
                }

                // 歌名溢出子控件
                const stOverflow = document.getElementById('cfgStOverflow');
                if (stOverflow) {
                    const ov = stOverflow.value;
                    document.getElementById('rowStScrollSpeed').style.display = ov === 'scroll' ? 'flex' : 'none';
                    document.getElementById('rowStPpTime').style.display = ov === 'pingpong' ? 'flex' : 'none';
                    document.getElementById('rowStPpPause').style.display = ov === 'pingpong' ? 'flex' : 'none';
                    document.getElementById('rowStScrollEase').style.display = (ov === 'scroll' || ov === 'pingpong') ? 'flex' : 'none';
                }

                // 歌词溢出子控件
                const pureOv = document.getElementById('cfgPureOverflow').value;
                document.getElementById('rowPureScrollSpeed').style.display = pureOv === 'scroll' ? 'flex' : 'none';
                document.getElementById('rowPurePpTime').style.display = pureOv === 'pingpong' ? 'flex' : 'none';
                document.getElementById('rowPurePpPause').style.display = pureOv === 'pingpong' ? 'flex' : 'none';
                document.getElementById('rowPureScrollEase').style.display = (pureOv === 'scroll' || pureOv === 'pingpong') ? 'flex' : 'none';
            }

            // 绑定所有控件事件
            const controls = ['cfgOneLine', 'cfgFontScale', 'cfgTextAlign', 'cfgPlayer', 'cfgColor',
                'cfgGlow', 'cfgGlowColor', 'cfgStroke', 'cfgStrokeWidth', 'cfgStrokeColor',
                'cfgBg', 'cfgBgTransparent',
                'cfgCoverStyle', 'cfgCoverRotate', 'cfgSpinSpeed', 'cfgCoverSize',
                'cfgCoverPause', 'cfgCoverPauseHold',
                'cfgSongTitleFormat', 'cfgSongTitleSep',
                'cfgStColor', 'cfgStGlow', 'cfgStGlowColor', 'cfgStStroke', 'cfgStStrokeWidth', 'cfgStStrokeColor',
                'cfgStOverflow', 'cfgStScrollSpeed', 'cfgStPpTime', 'cfgStPpPause', 'cfgStScrollEase',
                'cfgStFontScale', 'cfgStTextAlign',
                'cfgPureOverflow', 'cfgPureScrollSpeed', 'cfgPurePpTime', 'cfgPurePpPause', 'cfgPureScrollEase'];
            controls.forEach(id => {
                const el = document.getElementById(id);
                el.addEventListener('change', () => { toggleSubRows(); refreshPreview(); });
                el.addEventListener('input', () => { toggleSubRows(); refreshPreview(); });
            });

            // 滑块值显示
            document.getElementById('cfgFontScale').addEventListener('input', () => {
                document.getElementById('fontScaleVal').textContent = document.getElementById('cfgFontScale').value + '×';
            });
            document.getElementById('cfgSpinSpeed').addEventListener('input', () => {
                document.getElementById('spinSpeedVal').textContent = document.getElementById('cfgSpinSpeed').value + 's';
            });
            document.getElementById('cfgCoverSize').addEventListener('input', () => {
                document.getElementById('coverSizeVal').textContent = document.getElementById('cfgCoverSize').value + 'px';
            });
            // 缩小参数：postMessage 实时更新（不重载 iframe）
            const _scaleSlider = document.getElementById('cfgCoverPauseScale');
            const _scaleNum = document.getElementById('cfgCoverPauseScaleNum');
            const _dirSelect = document.getElementById('cfgCoverPauseDir');
            function sendShrinkUpdate() {
                // 更新 URL 显示（供复制），但不重载 iframe
                refreshPreview(true); // true = skipReload
                const frame = document.getElementById('previewFrame');
                if (frame && frame.contentWindow) {
                    frame.contentWindow.postMessage({
                        type: 'shrinkUpdate',
                        scale: parseFloat(_scaleSlider.value),
                        dir: _dirSelect.value
                    }, '*');
                }
            }
            _scaleSlider.addEventListener('input', () => {
                _scaleNum.value = _scaleSlider.value;
                sendShrinkUpdate();
            });
            _scaleNum.addEventListener('input', () => {
                let v = Math.max(0, Math.min(1, parseFloat(_scaleNum.value) || 0));
                _scaleSlider.value = v;
                sendShrinkUpdate();
            });
            _dirSelect.addEventListener('change', () => {
                toggleSubRows();
                sendShrinkUpdate();
            });
            document.getElementById('cfgStScrollSpeed').addEventListener('input', () => {
                document.getElementById('stScrollSpeedVal').textContent = document.getElementById('cfgStScrollSpeed').value + ' px/s';
            });
            document.getElementById('cfgStPpTime').addEventListener('input', () => {
                document.getElementById('stPpTimeVal').textContent = document.getElementById('cfgStPpTime').value + 's';
            });
            document.getElementById('cfgStPpPause').addEventListener('input', () => {
                document.getElementById('stPpPauseVal').textContent = document.getElementById('cfgStPpPause').value + 's';
            });
            document.getElementById('cfgStFontScale').addEventListener('input', () => {
                document.getElementById('stFontScaleVal').textContent = document.getElementById('cfgStFontScale').value + '×';
            });
            document.getElementById('cfgPureScrollSpeed').addEventListener('input', () => {
                document.getElementById('pureScrollSpeedVal').textContent = document.getElementById('cfgPureScrollSpeed').value + ' px/s';
            });
            document.getElementById('cfgPurePpTime').addEventListener('input', () => {
                document.getElementById('purePpTimeVal').textContent = document.getElementById('cfgPurePpTime').value + 's';
            });
            document.getElementById('cfgPurePpPause').addEventListener('input', () => {
                document.getElementById('purePpPauseVal').textContent = document.getElementById('cfgPurePpPause').value + 's';
            });

            // === 颜色 hex 输入同步 + 重置 ===
            const colorPairs = [
                { color: 'cfgColor', hex: 'hexColor' },
                { color: 'cfgGlowColor', hex: 'hexGlowColor' },
                { color: 'cfgStrokeColor', hex: 'hexStrokeColor' },
                { color: 'cfgBg', hex: 'hexBg' },
                { color: 'cfgStColor', hex: 'hexStColor' },
                { color: 'cfgStGlowColor', hex: 'hexStGlowColor' },
                { color: 'cfgStStrokeColor', hex: 'hexStStrokeColor' }
            ];
            colorPairs.forEach(({ color, hex }) => {
                const colorEl = document.getElementById(color);
                const hexEl = document.getElementById(hex);
                colorEl.addEventListener('input', () => { hexEl.value = colorEl.value; });
                hexEl.addEventListener('input', () => {
                    let v = hexEl.value.trim();
                    if (v && !v.startsWith('#')) v = '#' + v;
                    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
                        colorEl.value = v;
                        hexEl.value = v;
                        refreshPreview();
                    }
                });
                hexEl.addEventListener('blur', () => {
                    let v = hexEl.value.trim();
                    if (v && !v.startsWith('#')) v = '#' + v;
                    if (/^#[0-9a-fA-F]{6}$/.test(v)) {
                        hexEl.value = v;
                    } else {
                        hexEl.value = colorEl.value;
                    }
                });
            });
            document.querySelectorAll('.color-reset').forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.dataset.target;
                    const defaultVal = btn.dataset.default;
                    document.getElementById(target).value = defaultVal;
                    // 找对应的 hex 输入并同步
                    const pair = colorPairs.find(p => p.color === target);
                    if (pair) document.getElementById(pair.hex).value = defaultVal;
                    refreshPreview();
                });
            });

            // === 字体选择器 ===
            let _fontSelectorInited = false;
            // 检查 API 可用性，显示字体来源行（但不立即请求权限）
            if ('queryLocalFonts' in window) {
                document.getElementById('rowFontSource').style.display = 'flex';
                document.getElementById('fontLocalArea').style.display = 'block';
            } else {
                document.getElementById('fontManualArea').style.display = 'block';
            }

            async function initFontSelector() {
                if (_fontSelectorInited) return;
                _fontSelectorInited = true;
                if ('queryLocalFonts' in window) {
                    try {
                        const fonts = await window.queryLocalFonts();
                        // 按 family 去重，保留第一个 FontData 用于读取本地化名
                        const familyMap = new Map();
                        for (const f of fonts) {
                            if (!familyMap.has(f.family)) familyMap.set(f.family, f);
                        }
                        // 解析本地化字体名
                        const fontEntries = [];
                        await Promise.all([...familyMap.entries()].map(async ([family, fd]) => {
                            let locName = null;
                            try { locName = await _readLocalizedFamilyName(fd); } catch(e) {}
                            const display = (locName && locName !== family) ? `${locName}（${family}）` : family;
                            fontEntries.push({ family, display });
                        }));
                        fontEntries.sort((a, b) => a.display.localeCompare(b.display, 'zh'));
                        window._localFonts = fontEntries;
                        renderFontList(fontEntries);
                        document.getElementById('btnLoadFonts').style.display = 'none';
                        document.getElementById('fontSearchWrap').style.display = '';
                        document.getElementById('fontLocalArea').style.display = 'block';
                        document.getElementById('fontManualArea').style.display = 'none';
                    } catch (e) {
                        // 权限拒绝 → 仅手动输入
                        document.getElementById('rowFontSource').style.display = 'none';
                        document.getElementById('fontLocalArea').style.display = 'none';
                        document.getElementById('fontManualArea').style.display = 'block';
                    }
                } else {
                    // CEF 低版本 fallback：仅手动输入
                    document.getElementById('fontManualArea').style.display = 'block';
                }
            }

            // 从字体 blob 的 OpenType name table 中读取本地化 family 名称
            async function _readLocalizedFamilyName(fontData) {
                const blob = await fontData.blob();
                const headerBuf = await blob.slice(0, 1024).arrayBuffer();
                const hv = new DataView(headerBuf);
                let off0 = 0;
                // TTC 格式检测
                if (hv.getUint32(0) === 0x74746366) off0 = hv.getUint32(12);
                const numTables = hv.getUint16(off0 + 4);
                let nameOff = 0, nameLen = 0;
                for (let i = 0; i < numTables; i++) {
                    const base = off0 + 12 + i * 16;
                    if (base + 16 > headerBuf.byteLength) break;
                    if (hv.getUint32(base) === 0x6E616D65) { // 'name'
                        nameOff = hv.getUint32(base + 8);
                        nameLen = hv.getUint32(base + 12);
                        break;
                    }
                }
                if (!nameOff) return null;
                const nameBuf = await blob.slice(nameOff, nameOff + Math.min(nameLen, 8192)).arrayBuffer();
                const nv = new DataView(nameBuf);
                const count = nv.getUint16(2);
                const strBase = nv.getUint16(4);
                for (let i = 0; i < count; i++) {
                    const rec = 6 + i * 12;
                    if (rec + 12 > nameBuf.byteLength) break;
                    const pid = nv.getUint16(rec);
                    const lid = nv.getUint16(rec + 4);
                    const nid = nv.getUint16(rec + 6);
                    const len = nv.getUint16(rec + 8);
                    const soff = nv.getUint16(rec + 10);
                    // platformID=3(Windows), nameID=1(Family), languageID=0x0804(zh-CN) or 0x0404(zh-TW)
                    if (pid === 3 && nid === 1 && (lid === 0x0804 || lid === 0x0404)) {
                        if (strBase + soff + len > nameBuf.byteLength) continue;
                        const bytes = new Uint8Array(nameBuf, strBase + soff, len);
                        let name = '';
                        for (let j = 0; j < len; j += 2) name += String.fromCharCode((bytes[j] << 8) | bytes[j + 1]);
                        return name;
                    }
                }
                return null;
            }

            function renderFontList(fonts) {
                const list = document.getElementById('fontList');
                list.innerHTML = fonts.map(f => {
                    const family = typeof f === 'string' ? f : f.family;
                    const display = typeof f === 'string' ? f : f.display;
                    return `<div class="font-item" data-font="${family.replace(/"/g, '&quot;')}" style="font-family:'${family.replace(/'/g, "\\'")}'">${display}</div>`;
                }).join('');
                list.querySelectorAll('.font-item').forEach(el => {
                    el.addEventListener('click', () => selectLocalFont(el.dataset.font));
                });
            }

            function selectLocalFont(name) {
                window._selectedFont = name;
                document.getElementById('fontPreview').style.fontFamily = `'${name}', sans-serif`;
                document.querySelectorAll('.font-item').forEach(el => el.classList.remove('selected'));
                const sel = list_querySelector(name);
                if (sel) sel.classList.add('selected');
                // 显示本地化名并收起列表
                const entry = (window._localFonts || []).find(f => (typeof f === 'string' ? f : f.family) === name);
                const displayName = entry ? (typeof entry === 'string' ? entry : entry.display) : name;
                document.getElementById('fontSearch').value = displayName;
                document.getElementById('fontList').classList.remove('open');
                refreshPreview();
            }

            function list_querySelector(name) {
                const items = document.querySelectorAll('.font-item');
                for (const el of items) {
                    if (el.dataset.font === name) return el;
                }
                return null;
            }

            // 字体来源切换
            document.getElementById('cfgFontSource').addEventListener('change', () => {
                const src = document.getElementById('cfgFontSource').value;
                if (src === 'local') initFontSelector(); // 用户手势触发权限请求
                document.getElementById('fontLocalArea').style.display = src === 'local' ? 'block' : 'none';
                document.getElementById('fontManualArea').style.display = src === 'manual' ? 'block' : 'none';
                refreshPreview();
            });

            // 获取本地字体按钮
            document.getElementById('btnLoadFonts').addEventListener('click', () => {
                initFontSelector();
            });

            // 字体搜索过滤
            document.getElementById('fontSearch').addEventListener('input', () => {
                const q = document.getElementById('fontSearch').value.toLowerCase();
                const filtered = (window._localFonts || []).filter(f => {
                    if (typeof f === 'string') return f.toLowerCase().includes(q);
                    return f.display.toLowerCase().includes(q) || f.family.toLowerCase().includes(q);
                });
                renderFontList(filtered);
                document.getElementById('fontList').classList.add('open');
            });

            // 字体搜索框聚焦/失焦控制下拉
            document.getElementById('fontSearch').addEventListener('focus', () => {
                initFontSelector(); // 首次聚焦时触发权限请求（需要用户手势）
                document.getElementById('fontSearch').select();
                document.getElementById('fontList').classList.add('open');
            });
            document.getElementById('fontSearch').addEventListener('blur', () => {
                setTimeout(() => {
                    document.getElementById('fontList').classList.remove('open');
                    // 如果有已选字体，恢复显示本地化名
                    if (window._selectedFont && !document.getElementById('fontSearch').value.trim()) {
                        const entry = (window._localFonts || []).find(f => (typeof f === 'string' ? f : f.family) === window._selectedFont);
                        const displayName = entry ? (typeof entry === 'string' ? entry : entry.display) : window._selectedFont;
                        document.getElementById('fontSearch').value = displayName;
                    }
                }, 200);
            });

            // 手动字体输入（失焦后应用）
            document.getElementById('cfgFont').addEventListener('blur', () => {
                const name = document.getElementById('cfgFont').value.trim();
                if (name) {
                    document.getElementById('fontPreview').style.fontFamily = `'${name}', sans-serif`;
                } else {
                    document.getElementById('fontPreview').style.fontFamily = '';
                }
                refreshPreview();
            });

            // === URL 复制 ===
            function getBaseURL() {
                var raw;
                if (location.protocol === 'file:') {
                    raw = location.href.split('?')[0].split('#')[0];
                } else {
                    raw = location.origin + location.pathname;
                }
                // 复制时始终输出 lyric_display.html 的地址（Loader 入口）
                return raw.replace(/lyric_page\.html$/i, 'lyric_display.html');
            }

            function buildCoverQueryString() {
                const params = new URLSearchParams();
                params.set('cover_only', '');
                const cs = document.getElementById('cfgCoverStyle').value;
                if (cs && cs !== 'disc') params.set('cover_style', cs);
                const cr = document.getElementById('cfgCoverRotate').value;
                if (cr && cr !== 'playback') params.set('cover_rotate', cr);
                const spd = document.getElementById('cfgSpinSpeed').value;
                if (spd && spd !== '12') params.set('cover_spin_speed', spd);
                const csz = document.getElementById('cfgCoverSize').value;
                if (csz && csz !== '80') params.set('cover_size', csz);
                const player = document.getElementById('cfgPlayer').value;
                if (player) params.set('player', player);
                return '?' + params.toString();
            }

            function copyToClipboard(text, btn) {
                navigator.clipboard.writeText(text).then(() => {
                    const original = btn.textContent;
                    btn.textContent = '✓ 已复制';
                    btn.classList.add('copied');
                    setTimeout(() => {
                        btn.textContent = original;
                        btn.classList.remove('copied');
                    }, 1500);
                });
            }

            document.getElementById('btnCopyUrl').addEventListener('click', () => {
                const mode = getActiveMode();
                const btn = document.getElementById('btnCopyUrl');
                let qs;
                if (mode === 'cover') {
                    qs = buildCoverQueryString();
                    if (!document.getElementById('cfgCopyBgTransparent').checked) {
                        const bgTransparent = document.getElementById('cfgBgTransparent').checked;
                        if (!bgTransparent) {
                            const p = new URLSearchParams(qs.substring(1));
                            p.set('bg', document.getElementById('cfgBg').value);
                            qs = '?' + p.toString();
                        }
                    }
                } else {
                    qs = urlDisplay.textContent;
                    if (document.getElementById('cfgCopyBgTransparent').checked) {
                        const p = new URLSearchParams(qs.substring(1));
                        p.delete('bg');
                        qs = '?' + p.toString();
                    }
                }
                copyToClipboard(getBaseURL() + qs, btn);
            });

            // file:// 协议警告
            if (location.protocol === 'file:') {
                document.getElementById('fileWarning').style.display = 'block';
            }

            // === 可折叠分组 ===
            document.querySelectorAll('.editor-group-title').forEach(title => {
                title.addEventListener('click', () => {
                    title.parentElement.classList.toggle('collapsed');
                });
            });

            // 初始化：按默认模式显示分组
            switchMode('default');
        }

        function buildPreviewURL() {
            return '?default';
        }
    </script>
</body>

</html>
