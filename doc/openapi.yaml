        Per-player 端点始终返回指定播放器的数据，不受路由切换影响。

        **status 可能的值及含义：**
        - `"waiting_process"` - 播放器进程未启动
        - `"waiting_song"` - 播放器已启动但未选择歌曲
        - `"loading"` - 歌曲加载中，detail 为歌曲名称
        - `"playing"` - 播放中，detail 为歌曲标题（格式: 歌曲名 - 歌手）
        - `"paused"` - 暂停中（play_time 停止推进时自动检测），detail 为歌曲标题
        - `"standby"` - 待机状态，播放器已退出
      parameters:
        - $ref: "#/components/parameters/PlayerParam"
      responses:
        "200":
          description: 200 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/HTTPResponse"
                  - type: object
                    properties:
