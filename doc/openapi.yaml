        Per-player 端点始终返回指定播放器的数据，不受路由切换影响。响应格式与根端点相同，`player` 字段固定为对应播放器名。

        - `duration` - 歌曲总时长（秒）
        - `play_time` - 发送时的当前播放时间（秒），用于前端插值计时的初始锚点
        - `count` - 歌词行数
        - `lyrics` - 按 index 排序的歌词数组
