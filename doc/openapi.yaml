  /{player}/lyric_update:
    get:
      tags: [歌词]
      summary: 当前歌词（指定播放器）
      operationId: getPlayerLyricUpdate
      description: |
        返回指定播放器正在播放的最新一行歌词。
        Per-player 端点始终返回指定播放器的数据，不受路由切换影响。

        - `line_index` - 歌词行号
        - `text` - 主歌词文本
        - `sub_text` - 副歌词文本（翻译/音译等，无时为空字符串）
        - `timestamp` - 歌词时间戳（秒）
        - `play_time` - 实际播放时间（秒）；根据偏移量调整后的时间
        - `progress` - 播放进度（0-1）
      parameters:
        - $ref: "#/components/parameters/PlayerParam"
      responses:
        "200":
          description: 200 成功
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/HTTPResponse"
                  - type: object
                    properties:
                      data:
                        oneOf:
                          - $ref: "#/components/schemas/LyricUpdateData"
                          - $ref: "#/components/schemas/EmptyObject"
              examples:
                播放中:
                  summary: 播放中（有歌词时）
                  value:
                    code: 0
                    msg: success
                    player: wesing
                    data:
                      line_index: 5
                      text: "君に嘘をついていた"
                      sub_text: ""
                      timestamp: 9.0
                      play_time: 9.15
                      progress: 0.4167
                无歌词时:
