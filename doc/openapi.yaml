  /{player}/ws:
    get:
      tags: [WebSocket]
      summary: WebSocket 连接（指定播放器）
      operationId: wsPlayer
      description: |
        WebSocket 实时双向通信接口（指定播放器）。始终接收指定播放器事件，不受路由切换影响。

        > **注意：** 此端点实际为 WebSocket 协议（`ws://`），在 OpenAPI 中以 GET 方式描述。导入 Apifox 后请手动修改接口类型为 WebSocket。

        行为与根端点 `/ws` 相同，但：
        - 始终接收指定播放器的事件
        - **不会**收到 `player_switch`、`player_clear` 事件

        连接建立时立即接收 4 条消息：`status_update`、`song_info_update`、`lyric_update`、`all_lyrics`。
        后续实时事件类型：`status_update`、`song_info_update`、`lyric_update`、`all_lyrics`、`lyric_idle`、`playback_pause`、`playback_resume`。

        详细事件格式请参阅根端点 `/ws` 的描述。
      parameters:
        - $ref: "#/components/parameters/PlayerParam"
      responses:
        "101":
          description: WebSocket 握手成功，协议升级

# ============================================================
# WebSocket 事件（以 webhooks 描述服务端推送的事件结构）
# ============================================================
webhooks:
  status_update:
    post:
      tags: [WebSocket]
      summary: 状态更新事件
      operationId: onStatusUpdate
      description: |
        播放状态发生变化时推送。连接建立时立即发送一次当前状态。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: status_update
                player:
                  type: string
                  example: wesing
                data:
                  oneOf:
                    - $ref: "#/components/schemas/StatusInfo"
                    - $ref: "#/components/schemas/EmptyObject"
            examples:
              有状态时:
                value:
                  type: status_update
                  player: wesing
                  data:
                    status: playing
                    detail: "告白 - 花澤香菜"
              无状态时:
                value:
                  type: status_update
                  player: wesing
                  data: {}
      responses:
        "200":
          description: 事件已接收

  song_info_update:
    post:
      tags: [WebSocket]
      summary: 歌曲信息更新事件
      operationId: onSongInfoUpdate
      description: |
        歌曲信息发生变化时推送。连接建立时立即发送一次。
        部分播放器的封面 base64 异步获取，会先发送不含 cover_base64 的版本，待下载完成后补发完整版本。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: song_info_update
                player:
                  type: string
                  example: wesing
                data:
                  oneOf:
                    - $ref: "#/components/schemas/SongInfo"
                    - $ref: "#/components/schemas/EmptyObject"
            examples:
              有歌曲信息时:
                value:
                  type: song_info_update
                  player: wesing
                  data:
                    name: "告白"
                    singer: "花澤香菜"
                    title: "告白 - 花澤香菜"
                    cover: "http://imgcache.qq.com/music/photo/mid_album_500/a/b/001aBcDe23FgHi.jpg"
                    cover_base64: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."
              无歌曲信息时:
                value:
                  type: song_info_update
                  player: wesing
                  data: {}
      responses:
        "200":
          description: 事件已接收

  lyric_update:
    post:
      tags: [WebSocket]
      summary: 实时歌词更新事件
      operationId: onLyricUpdate
      description: |
        歌词行发生变化时推送。连接建立时立即发送一次当前歌词。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: lyric_update
                player:
                  type: string
                  example: wesing
                data:
                  oneOf:
                    - $ref: "#/components/schemas/LyricUpdateData"
                    - $ref: "#/components/schemas/EmptyObject"
            examples:
              有歌词时:
                value:
                  type: lyric_update
                  player: wesing
                  data:
                    line_index: 5
                    text: "君に嘘をついていた"
                    sub_text: ""
                    timestamp: 9.0
                    play_time: 9.15
                    progress: 0.4167
              无歌词时:
                value:
                  type: lyric_update
                  player: wesing
                  data: {}
      responses:
        "200":
          description: 事件已接收

  all_lyrics:
    post:
      tags: [WebSocket]
      summary: 完整歌词列表事件
      operationId: onAllLyrics
      description: |
        新歌曲开始播放时推送完整歌词列表。连接建立时立即发送一次。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: all_lyrics
                player:
                  type: string
                  example: wesing
                data:
                  oneOf:
                    - $ref: "#/components/schemas/AllLyricsData"
                    - $ref: "#/components/schemas/EmptyObject"
            examples:
              有歌词时:
                value:
                  type: all_lyrics
                  player: wesing
                  data:
                    song_title: "告白 - 花澤香菜"
                    duration: 236.0
                    play_time: 1.2
                    count: 3
                    lyrics:
                      - { index: 0, time: 0.5, text: "いつもそばにいるのに", sub_text: "" }
                      - { index: 1, time: 2.1, text: "ふと気付くと遠すぎて", sub_text: "" }
                      - { index: 2, time: 3.8, text: "手を伸ばしても届かない", sub_text: "" }
              无歌词时:
                value:
                  type: all_lyrics
                  player: wesing
                  data: {}
      responses:
        "200":
          description: 事件已接收

  lyric_idle:
    post:
      tags: [WebSocket]
      summary: 歌词空闲通知事件
      operationId: onLyricIdle
      description: |
        歌曲播放结束、切歌或窗口关闭时发送。纯通知事件，`data` 始终为 `{}`。
        服务端不会发送清空歌词数据的消息，前端可自行决定是否响应。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: lyric_idle
                player:
                  type: string
                  example: wesing
                data:
                  $ref: "#/components/schemas/EmptyObject"
            example:
              type: lyric_idle
              player: wesing
              data: {}
      responses:
        "200":
          description: 事件已接收

  playback_pause:
    post:
      tags: [WebSocket]
      summary: 暂停播放事件
      operationId: onPlaybackPause
      description: |
        当 play_time 连续多次不变时检测为暂停。前端收到后应停止时间插值。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: playback_pause
                player:
                  type: string
                  example: wesing
                data:
                  $ref: "#/components/schemas/PlaybackTimeInfo"
            example:
              type: playback_pause
              player: wesing
              data:
                play_time: 45.2
      responses:
        "200":
          description: 事件已接收

  playback_resume:
    post:
      tags: [WebSocket]
      summary: 恢复播放事件
      operationId: onPlaybackResume
      description: |
        play_time 重新推进时发送。前端收到后应以 play_time 为锚点重新开始插值。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: playback_resume
                player:
                  type: string
                  example: wesing
                data:
                  $ref: "#/components/schemas/PlaybackTimeInfo"
            example:
              type: playback_resume
              player: wesing
              data:
                play_time: 45.2
      responses:
        "200":
          description: 事件已接收

  player_switch:
    post:
      tags: [WebSocket]
      summary: 播放器切换事件
      operationId: onPlayerSwitch
      description: |
        活跃播放器发生变化时推送。仅根订阅者（`/ws`）收到此事件，Per-player 订阅者不会收到。
        紧随其后会收到新播放器的已缓存状态事件。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: player_switch
                player:
                  type: string
                  description: 切换后的新播放器
                  example: cloudmusicv3
                data:
                  $ref: "#/components/schemas/PlayerSwitchInfo"
            example:
              type: player_switch
              player: cloudmusicv3
              data:
                from: wesing
                to: cloudmusicv3
      responses:
        "200":
          description: 事件已接收

  player_clear:
    post:
      tags: [WebSocket]
      summary: 活跃播放器清除事件
      operationId: onPlayerClear
      description: |
        所有播放器都停止输出（全员 inert）时推送。仅根订阅者（`/ws`）收到此事件。
        总是与 `player_switch`(to="") 一起发送（双重通知，向后兼容）。
        前端应清空歌词、封面、进度等所有显示内容。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, player, data]
              properties:
                type:
                  type: string
                  const: player_clear
                player:
                  type: string
                  description: 空字符串
                  example: ""
                data:
                  type: object
                  description: 空对象
            example:
              type: player_clear
              player: ""
              data: {}
      responses:
        "200":
          description: 事件已接收

# ============================================================
# 复用组件定义
# ============================================================
components:
  parameters:
    PlayerParam:
      name: player
      in: path
      required: true
      description: 播放器标识名
      schema:
        type: string
        enum:
          - wesing
          - cloudmusicv3
          - qqmusic
        example: wesing

  schemas:
    # ----------------------------------------------------------
    # 响应信封
    # ----------------------------------------------------------
    HTTPResponse:
      type: object
      required: [code, msg, player, data]
      properties:
        code:
          type: integer
          description: 状态码，0 表示成功
          example: 0
        msg:
          type: string
          description: 状态消息
          example: success
        player:
          type: string
          description: 数据来源播放器标识名（系统端点为 `"internal"`）
          example: wesing
        data:
          description: 响应载荷，无数据时为空对象 `{}`

    WSEvent:
      type: object
      required: [type, player, data]
      description: WebSocket / SSE 统一事件格式
      properties:
        type:
          type: string
          description: 事件类型名
          enum:
            - status_update
            - song_info_update
            - lyric_update
            - all_lyrics
            - lyric_idle
            - playback_pause
            - playback_resume
            - player_switch
            - player_clear
        player:
          type: string
          description: 数据来源播放器标识名
          example: wesing
        data:
          description: 事件载荷，无数据时为空对象 `{}`

    # ----------------------------------------------------------
    # 空对象
    # ----------------------------------------------------------
    EmptyObject:
      type: object
      description: 空对象 `{}`，表示无数据
      maxProperties: 0

    # ----------------------------------------------------------
    # 数据载荷
    # ----------------------------------------------------------
    HealthCheckData:
      type: object
      required: [now_time]
      properties:
        now_time:
          type: string
          format: date-time
          description: 当前服务器时间
          example: "2026-03-19T12:34:56+08:00"

    ServiceStatusData:
      type: object
      required: [version, addr, now_time, config_sources, config, config_overwritten, player_support, player_running, player_status, endpoints, client_count, ws_connected]
      properties:
        version:
          type: string
          description: 服务版本号（编译时通过 `-ldflags` 注入，默认值为 `0.0.0`）
          example: "3.0.0"
        addr:
          type: string
          description: 服务监听地址
          example: "0.0.0.0:8765"
        now_time:
          type: string
          format: date-time
          description: 当前服务器时间
          example: "2026-03-19T12:34:56+08:00"
        config_sources:
          type: array
          description: |
            配置来源的完整链路，按优先级顺序排列。
            可能的值：`"内置默认"`、`"config.yml"`、`"命令行参数"`
          items:
            type: string
          example: ["config.yml", "命令行参数"]
        config:
          type: object
          description: 当前生效的配置项
          properties:
            addr:
              type: string
              example: "0.0.0.0:8765"
            offset:
              type: integer
              description: 全局歌词偏移量（毫秒）
              example: 200
            poll:
              type: integer
              description: 全局轮询间隔（毫秒）
              example: 30
            prior-player:
              type: array
              description: 优先播放器列表
              items:
                type: string
              example: ["wesing"]
            prior-player-expire:
              type: integer
              description: 优先播放器过期时间（秒）
              example: 15
            wesing-offset:
              type: integer
              description: wesing 歌词偏移量（毫秒）
              example: 200
            wesing-poll:
              type: integer
              description: wesing 轮询间隔（毫秒）
              example: 30
            cloudmusicv3-offset:
              type: integer
              description: cloudmusicv3 歌词偏移量（毫秒）
              example: 500
            cloudmusicv3-poll:
              type: integer
              description: cloudmusicv3 轮询间隔（毫秒）
              example: 30
            qqmusic-offset:
              type: integer
              description: qqmusic 歌词偏移量（毫秒）
              example: 200
            qqmusic-poll:
              type: integer
              description: qqmusic 轮询间隔（毫秒）
              example: 50
        config_overwritten:
          type: array
          description: 被更高优先级来源覆盖的配置键名列表
          items:
            type: string
          example: ["offset", "wesing-poll"]
        player_support:
          type: array
          description: 系统编译时注册的所有播放器标识名列表
          items:
            type: string
            enum:
              - wesing
              - cloudmusicv3
              - qqmusic
          example: ["wesing", "cloudmusicv3", "qqmusic"]
        player_running:
          type: array
          description: 当前正在运行（非 offline / standby / waiting_process）的播放器列表
          items:
            type: string
            enum:
              - wesing
              - cloudmusicv3
              - qqmusic
          example: ["wesing"]
        player_status:
          type: object
          description: |
            所有支持的播放器及其当前状态（按注册顺序）。
            可能的状态值：`"offline"` / `"waiting_process"` / `"waiting_song"` / `"loading"` / `"playing"` / `"paused"` / `"standby"`
          additionalProperties:
            type: string
            enum: [offline, waiting_process, waiting_song, loading, playing, paused, standby]
          example:
            wesing: playing
            cloudmusicv3: waiting_process
            qqmusic: waiting_process
        endpoints:
          type: object
          description: |
            所有可用接口的完整地址（含 Per-player 端点）。
            WebSocket 使用 `ws://`，HTTP/SSE 使用 `http://`。
            结构为根端点地址 + 每个播放器的子对象。
        client_count:
          type: integer
          description: 当前已连接的客户端总数
          example: 2
        ws_connected:
          type: object
          description: WebSocket 连接状态
          required: [connected, clients]
          properties:
            connected:
              type: boolean
              description: 是否有客户端连接
              example: true
            clients:
              type: array
              description: 已连接的客户端 IP 地址列表（RemoteAddr 格式）
              items:
                type: string
              example: ["192.168.1.100:54321", "192.168.1.200:54322"]

    StatusInfo:
      type: object
      required: [status, detail]
      properties:
        status:
          type: string
          description: |
            播放状态。可能的值：
            - `"waiting_process"` - 播放器进程未启动
            - `"waiting_song"` - 播放器已启动但未选择歌曲
            - `"loading"` - 歌曲加载中，detail 为歌曲名称
            - `"playing"` - 播放中，detail 为歌曲标题（格式: 歌曲名 - 歌手）
            - `"paused"` - 暂停中（play_time 停止推进时自动检测），detail 为歌曲标题
            - `"standby"` - 待机状态，播放器已退出
          enum:
            - waiting_process
            - waiting_song
            - loading
            - playing
            - paused
            - standby
          example: playing
        detail:
          type: string
          description: 状态详情（歌曲标题或状态说明）
          example: "告白 - 花澤香菜"

    SongInfo:
      type: object
      required: [name, singer, title, cover, cover_base64]
      properties:
        name:
          type: string
          description: 歌曲名称
          example: "告白"
        singer:
          type: string
          description: 歌手名称
          example: "花澤香菜"
        title:
          type: string
          description: 歌曲标题（格式：歌曲名 - 歌手）
          example: "告白 - 花澤香菜"
        cover:
          type: string
          description: 封面图片 URL
          example: "http://imgcache.qq.com/music/photo/mid_album_500/a/b/001aBcDe23FgHi.jpg"
        cover_base64:
          type: string
          description: |
            封面图片 Base64 编码。
            部分播放器的封面 base64 通过异步 HTTP 下载获取，歌曲开始播放时会先发送一条不含 cover_base64 的 song_info_update（仅含 cover URL），待封面下载完成后再补发一条含 cover_base64 的完整版本。前端应使用最新收到的数据覆盖即可。
          example: "data:image/jpeg;base64,/9j/4AAQSkZJRg..."

    LyricUpdateData:
      type: object
      required: [line_index, text, sub_text, timestamp, play_time, progress]
      properties:
        line_index:
          type: integer
          description: 歌词行号
          example: 5
        text:
          type: string
          description: 主歌词文本
          example: "君に嘘をついていた"
        sub_text:
          type: string
          description: 副歌词文本（翻译/音译等，无时为空字符串）
          example: ""
        timestamp:
          type: number
          format: float
          description: 歌词时间戳（秒）
          example: 9.0
        play_time:
          type: number
          format: float
          description: 实际播放时间（秒）；根据偏移量调整后的时间
          example: 9.15
        progress:
          type: number
          format: float
          description: 播放进度（0-1）
          example: 0.4167

    LyricLine:
      type: object
      required: [index, time, text, sub_text]
      properties:
        index:
          type: integer
          description: 歌词行索引
          example: 0
        time:
          type: number
          format: float
          description: 歌词时间戳（秒）
          example: 0.5
        text:
          type: string
          description: 歌词文本
          example: "いつもそばにいるのに"
        sub_text:
          type: string
          description: 副歌词文本（翻译/音译等，无时为空字符串）
          example: ""

    AllLyricsData:
      type: object
      required: [song_title, duration, play_time, count, lyrics]
      properties:
        song_title:
          type: string
          description: 歌曲标题（格式：歌曲名 - 歌手）
          example: "告白 - 花澤香菜"
        duration:
          type: number
          format: float
          description: 歌曲总时长（秒）
          example: 236.0
        play_time:
          type: number
          format: float
          description: 发送时的当前播放时间（秒），用于前端插值计时的初始锚点
          example: 1.2
        count:
          type: integer
          description: 歌词行数
          example: 12
        lyrics:
          type: array
          description: 按 index 排序的歌词数组
          items:
            $ref: "#/components/schemas/LyricLine"

    PlaybackTimeInfo:
      type: object
      required: [play_time]
      properties:
        play_time:
          type: number
          format: float
          description: 当前播放时间（秒）
          example: 45.2

    PlayerSwitchInfo:
      type: object
      required: [from, to]
      properties:
        from:
          type: string
          description: 切换前的播放器标识名
          example: wesing
        to:
          type: string
          description: 切换后的播放器标识名
          example: cloudmusicv3

    # ----------------------------------------------------------
    # SSE 事件 schema（用于 text/event-stream 响应描述）
    # ----------------------------------------------------------
    SSELyricUpdateEvent:
      type: object
      description: |
        SSE 歌词更新事件。每行以 `data: ` 前缀发送 JSON。
        格式：`data: {"type":"lyric_update","player":"...","data":{...}}`
      required: [type, player, data]
      properties:
        type:
          type: string
          const: lyric_update
        player:
          type: string
          example: wesing
        data:
          oneOf:
            - $ref: "#/components/schemas/LyricUpdateData"
            - $ref: "#/components/schemas/EmptyObject"

    SSESongInfoUpdateEvent:
      type: object
      description: |
        SSE 歌曲信息更新事件。每行以 `data: ` 前缀发送 JSON。
        格式：`data: {"type":"song_info_update","player":"...","data":{...}}`
      required: [type, player, data]
      properties:
        type:
          type: string
          const: song_info_update
        player:
          type: string
          example: wesing
        data:
          oneOf:
            - $ref: "#/components/schemas/SongInfo"
            - $ref: "#/components/schemas/EmptyObject"
