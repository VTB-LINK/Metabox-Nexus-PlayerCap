name: Build Windows Executable

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted
    environment: build-dev
    env:
      GOOS: windows
      GOARCH: amd64
      OUTPUT_NAME: Metabox-Nexus-WesingCap
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      
      - name: Prepare variables
        id: vars
        run: |
          # иЋ·еЏ–commit hashпј€зџ­з‰€жњ¬пј‰
          COMMIT_HASH=$(git rev-parse --short HEAD)
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_OUTPUT
          
          # иЋ·еЏ–еЅ“е‰Ќж—Ґжњџж—¶й—ґпј€ж јејЏпјљYYYYMMDD-HHMMSSпј‰
          BUILD_TIME=$(date +%Y%m%d-%H%M%S)
          echo "BUILD_TIME=${BUILD_TIME}" >> $GITHUB_OUTPUT
          
          # иЋ·еЏ–е®Њж•ґзљ„timestampз”ЁдєЋе±•з¤є
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT
          
          echo "Build Info: Commit=$COMMIT_HASH, Time=$BUILD_TIME"
      
      - name: Build Windows executable
        run: |
          # иЋ·еЏ–commit hashе’Њbuild time
          COMMIT_HASH=${{ steps.vars.outputs.COMMIT_HASH }}
          BUILD_TIME=${{ steps.vars.outputs.BUILD_TIME }}
          
          # з‰€жњ¬еЏ·дёЋж–‡д»¶еђЌдїќжЊЃдёЂи‡ґпјљ<name>-<date-time>-<commit-hash>
          VERSION="${OUTPUT_NAME}-${BUILD_TIME}-${COMMIT_HASH}"
          
          # жћ„е»єеЏЇж‰§иЎЊж–‡д»¶пјЊж–‡д»¶еђЌж јејЏпјљ<name>-<date-time>-<commit-hash>.exe
          EXE_NAME="${VERSION}.exe"
          echo "EXE_NAME=${EXE_NAME}" >> $GITHUB_ENV
          
          go build -ldflags "-X 'main.Version=${VERSION}'" -o "${EXE_NAME}"
          
          if [ -f "${EXE_NAME}" ]; then
            ls -lh "${EXE_NAME}"
            echo "Build successful!"
          else
            echo "Build failed!"
            exit 1
          fi
      
      - name: Prepare files for packaging
        run: |
          # иЋ·еЏ–commit hashе’Њbuild time
          COMMIT_HASH=${{ steps.vars.outputs.COMMIT_HASH }}
          BUILD_TIME=${{ steps.vars.outputs.BUILD_TIME }}
          
          # е€›е»єдёґж—¶з›®еЅ•з”ЁдєЋж‰“еЊ…
          PACKAGE_DIR="Metabox-Nexus-WesingCap-${BUILD_TIME}-${COMMIT_HASH}"
          mkdir -p "${PACKAGE_DIR}"
          
          # е¤Ќе€¶йњЂи¦Ѓзљ„ж–‡д»¶
          cp "${EXE_NAME}" "${PACKAGE_DIR}/"
          cp config.yml "${PACKAGE_DIR}/"
          cp lyric_display.html "${PACKAGE_DIR}/"
          cp doc/API_RESPONSE_EXAMPLES.md "${PACKAGE_DIR}/"
          cp README.md "${PACKAGE_DIR}/" 2>/dev/null || true
          
          echo "PACKAGE_DIR=${PACKAGE_DIR}" >> $GITHUB_ENV
      
      - name: Create compressed archive
        run: |
          # иЋ·еЏ–commit hashе’Њbuild time
          COMMIT_HASH=${{ steps.vars.outputs.COMMIT_HASH }}
          BUILD_TIME=${{ steps.vars.outputs.BUILD_TIME }}
          
          # е€›е»єzipеЋ‹зј©еЊ…
          ARCHIVE_NAME="Metabox-Nexus-WesingCap-${BUILD_TIME}-${COMMIT_HASH}.zip"
          
          # иї›е…Ґз›®еЅ•еђЋеЋ‹зј©пјЊиї™ж ·zipе†…дёЌдјљеЊ…еђ«з›®еЅ•е±‚зє§
          cd "${PACKAGE_DIR}"
          zip -r "../${ARCHIVE_NAME}" .
          cd ..
          echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
          
          if [ -f "${ARCHIVE_NAME}" ]; then
            ls -lh "${ARCHIVE_NAME}"
            echo "ARCHIVE_NAME=${ARCHIVE_NAME}" >> $GITHUB_ENV
            echo "Archive created successfully!"
          else
            echo "Archive creation failed!"
            exit 1
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: Metabox-Nexus-WesingCap-${{ steps.vars.outputs.BUILD_TIME }}-${{ steps.vars.outputs.COMMIT_HASH }}
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 30
      
      - name: List artifacts
        run: |
          echo "Build completed successfully!"
          echo "Executable: ${{ env.EXE_NAME }}"
          echo "Archive: ${{ env.ARCHIVE_NAME }}"
          echo "Commit: ${{ steps.vars.outputs.COMMIT_HASH }}"
          echo "Build Time: ${{ steps.vars.outputs.TIMESTAMP }}"
